services:
  derper:
    build:
      context: .
      dockerfile: Dockerfile.derper
    container_name: derper
    restart: unless-stopped
    # derper tu quan ly TLS qua Let's Encrypt (chung chi luu vao volume derper_certs).
    # Truoc khi deploy: DNS vpn3.hangocthanh.io.vn phai tro dung IP VPS nay.
    # --verify-clients=false: DERP relay mo (du lieu van ma hoa WireGuard, relay
    # khong doc duoc noi dung). Neu muon chi cho node trong tailnet su dung, set
    # verify-clients=true va them --verify-clients-url=https://vpn2.hangocthanh.io.vn
    command:
      - --hostname=vpn3.hangocthanh.io.vn
      - --a=:443
      - --http-port=80
      - --certmode=letsencrypt
      - --certdir=/data/derper-certs
      - --stun
      - --stun-port=3478
      - --verify-clients=false
    ports:
      - "80:80"          # ACME challenge (Let's Encrypt)
      - "443:443"        # HTTPS / DERP WebSocket
      - "3478:3478/udp"  # STUN
    volumes:
      - derper_certs:/data/derper-certs

  # Tailscale sidecar: vpn3 join tailnet -> ping-reporter co the dung LocalAPI
  # de ping cac peer va tim dia chi IP cua collector (vpn2).
  # TS_AUTHKEY lay tu .env (do deploy workflow ghi tu headscale API).
  tailscale:
    image: tailscale/tailscale:latest
    container_name: ts-vpn3
    hostname: vpn3
    restart: unless-stopped
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY:-}
      - TS_EXTRA_ARGS=--login-server=https://vpn2.hangocthanh.io.vn --hostname=vpn3 --accept-dns=false
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
      - TS_SOCKET=/var/run/tailscale/tailscaled.sock
    volumes:
      - tailscale_vpn3:/var/lib/tailscale
      - ts_sock:/var/run/tailscale
    devices:
      - /dev/net/tun
    cap_add:
      - NET_ADMIN

  # Ping-reporter: moi 30s ping tung peer online qua LocalAPI, POST ket qua
  # len collector (vpn2) tai collector_ip:8090/metrics/report (qua tailnet).
  # Du lieu luu vao DB voi src='vpn3' -> hien thi tren /derp page.
  ping-reporter:
    image: python:3.12-slim
    container_name: ping-reporter-vpn3
    restart: unless-stopped
    # Cung netns voi sidecar -> co IP tailnet de POST ket qua toi collector
    # (100.64.0.1:8090) qua WireGuard. Khong co cai nay thi POST timeout.
    network_mode: "service:tailscale"
    command: ["python3", "/app/reporter.py"]
    environment:
      - REPORTER_NAME=vpn3
      - TS_SOCKET=/var/run/tailscale/tailscaled.sock
      - POLL_INTERVAL=30
      - COLLECTOR_PORT=8090
      - PING_TIMEOUT=8
    volumes:
      - ../ping-reporter/reporter.py:/app/reporter.py:ro
      - ts_sock:/var/run/tailscale
    depends_on:
      - tailscale

volumes:
  derper_certs:
  tailscale_vpn3:
  ts_sock:
