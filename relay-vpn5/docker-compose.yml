services:

  # Custom hybrid DERP relay:
  # - TCP side (port 8080, via Traefik): accepts DERP connections from any client
  # - UDP side (port 41641): sends WireGuard packets to UDP-capable peers
  relay:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: relay-vpn5
    restart: unless-stopped
    command:
      - -addr=:8080
      - -ts-socket=/var/run/tailscale/tailscaled.sock
      - -key-file=/data/relay.key
      - -cache-ttl=5s
    ports:
      - "41641:41641/udp"   # WireGuard UDP — relay→peer outbound + peer→relay inbound
    volumes:
      - relay_data:/data
      - ts_sock:/var/run/tailscale
    networks:
      - pangolin_net
    depends_on:
      - tailscale

  # Tailscale sidecar: joins the tailnet as node "vpn5".
  # Relay queries its LocalAPI to discover which peers have reachable UDP endpoints.
  # Pattern identical to derp-vpn4.
  tailscale:
    image: tailscale/tailscale:latest
    container_name: ts-vpn5
    hostname: vpn5
    restart: unless-stopped
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY:-}
      - TS_EXTRA_ARGS=--login-server=https://vpn2.hangocthanh.io.vn --hostname=vpn5 --accept-dns=false
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
      - TS_SOCKET=/var/run/tailscale/tailscaled.sock
    volumes:
      - tailscale_vpn5:/var/lib/tailscale
      - ts_sock:/var/run/tailscale
    devices:
      - /dev/net/tun
    cap_add:
      - NET_ADMIN
    networks:
      - pangolin_net

  # Ping reporter: same pattern as vpn4 — reports relay latency per peer.
  ping-reporter:
    image: python:3.12-slim
    container_name: ping-reporter-vpn5
    restart: unless-stopped
    command: ["python3", "/app/reporter.py"]
    environment:
      - REPORTER_NAME=vpn5
      - TS_SOCKET=/var/run/tailscale/tailscaled.sock
      - POLL_INTERVAL=30
      - COLLECTOR_PORT=8090
      - PING_TIMEOUT=8
    volumes:
      - ../ping-reporter/reporter.py:/app/reporter.py:ro
      - ts_sock:/var/run/tailscale
    depends_on:
      - tailscale
    networks:
      - pangolin_net

networks:
  pangolin_net:
    external: true
    name: pangolin_network

volumes:
  relay_data:
  tailscale_vpn5:
  ts_sock:
