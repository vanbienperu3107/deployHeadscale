# DERP map bo sung cho headscale.
# Region 999 (vpn2/myderp) duoc headscale tu dong them qua
# automatically_add_embedded_derp_region: true.
# Region 1000 (vpn3-vn), 1001 (vpn4-vn), 1002 (vpn5 = derper v1.100.0 tren
# host vpn4, port rieng - xem CUTOVER note ben duoi), 1003 (vpn6 derper qua sslh)
# them o day qua derp.paths.
#
# Tailscale client do latency tat ca region va chon con DERP GAN NHAT (thap nhat).
# Neu 1 region chet, tu dong chuyen sang con con lai (~5-15s).
# Khong dung avoid: true -> tat ca region binh dang, tailscale tu chon.
regions:
  1000:
    regionid: 1000
    regioncode: "vpn3-vn"
    regionname: "VPN3 Vietnam"
    nodes:
      - name: "vpn3-vn-1"
        regionid: 1000
        hostname: "vpn3.hangocthanh.io.vn"
        ipv4: "64.176.23.196"
        stunport: 3478
        derpport: 443
  1001:
    regionid: 1001
    regioncode: "vpn4-vn"
    regionname: "VPN4 Vietnam"
    nodes:
      - name: "vpn4-vn-1"
        regionid: 1001
        hostname: "vpn4.hangocthanh.io.vn"
        ipv4: "149.104.66.174"
        stunport: 3478
        derpport: 443
  1002:
    regionid: 1002
    regioncode: "vpn5-us"
    regionname: "VPN5 (derper v1.100.0, chay tren host vpn4)"
    # CUTOVER 2026-07-02: domain vpn5.hangocthanh.io.vn doi tro tu server cu
    # (204.199.161.89) sang IP vpn4 (149.104.66.174). derper2 la instance
    # THU 2 tren vpn4, khong dung port 80/443 (da bi derp-vpn4 chiem giu cho
    # domain vpn4.hangocthanh.io.vn) -> port/stun rieng. Server vpn5 cu can
    # duoc tat thu cong. Xem docs/DERP-VPN4-V2-CUTOVER.md.
    nodes:
      - name: "vpn5-us-1"
        regionid: 1002
        hostname: "vpn5.hangocthanh.io.vn"
        ipv4: "149.104.66.174"
        stunport: 3479
        derpport: 8443
  1003:
    regionid: 1003
    regioncode: "vpn6-vn"
    regionname: "VPN6 Vietnam"
    nodes:
      - name: "vpn6-vn-1"
        regionid: 1003
        hostname: "vpn6.hangocthanh.io.vn"
        ipv4: "45.119.87.220"
        stunport: 3478
        derpport: 443
