# === Server ===
server_url: https://vpn2.hangocthanh.io.vn
listen_addr: 0.0.0.0:8080
metrics_listen_addr: 0.0.0.0:9090
grpc_listen_addr: 0.0.0.0:50443
grpc_allow_insecure: false

noise:
  private_key_path: /var/lib/headscale/noise_private.key

# === IP Allocation ===
prefixes:
  v4: 100.64.0.0/10
  v6: fd7a:115c:a1e0::/48
  allocation: sequential

# === DERP (embedded — self-hosted relay) ===
derp:
  server:
    enabled: false
    region_id: 999
    region_code: "controller"
    region_name: "VPN2 Controller"
    verify_clients: true
    stun_listen_addr: "0.0.0.0:3478"
    private_key_path: /var/lib/headscale/derp_server_private.key
    automatically_add_embedded_derp_region: false
    ipv4: 165.22.12.169    # IP public VPS (vpn2.hangocthanh.io.vn)
    # ipv6: YOUR_IPV6              # ← nếu có

  # DERP map bo sung: vpn3 (region 1000) tu file ngoai. Region 999 (embedded, vpn2)
  # tu dong them boi automatically_add_embedded_derp_region. Client thay 2 region
  # -> tu do latency. Neu 1 region chet, tailscale tu chuyen sang region con lai.
  # -> tu do latency. Neu 1 region chet, tailscale tu chuyen sang region con lai.
  # DERP map DONG: lay tu backend 'derp-backend' (DB Postgres) qua /derpmap.json.
  # urls: tat tam thoi cho den khi derp-backend duoc deploy va ket noi cung network.
  # Khi derp-backend chay, uncomment dong duoi de enable dynamic DERP map.
  paths: []
  # Lay DERPMap dong tu derp-backend (Neon DB). Bat buoc vi embedded DERP da tat
  # -> headscale can it nhat 1 region de khoi dong. auto_update cap nhat moi 10s.
  urls:
    - http://derp-backend:8787/derpmap.json
  auto_update_enabled: true
  update_frequency: 10s

  # Feature B: per-node DERPMap override. headscale gọi dashboard API (30s cache,
  # 500ms timeout) — node không có assignment sẽ nhận DERPMap mặc định (fail-open).
  # secret nạp từ env HEADSCALE_DERP_DASHBOARD_SECRET (xem docker-compose.yml).
  dashboard:
    enabled: true
    url: http://derp-backend:8787
    timeout_ms: 500

# === Node ===
node:
  expiry: 0    # không tự hết hạn
  ephemeral:
    inactivity_timeout: 30m
  routes:
    ha:
      probe_interval: 10s
      probe_timeout: 5s

# === Database (SQLite) ===
database:
  type: sqlite
  sqlite:
    path: /var/lib/headscale/db.sqlite
    write_ahead_log: true

# === DNS ===
dns:
  magic_dns: true
  base_domain: tail.hangocthanh.io.vn    # base domain MagicDNS (PHẢI khác server_url)
  override_local_dns: true
  nameservers:
    global:
      - 1.1.1.1
      - 8.8.8.8
    # Split DNS quản lý qua CMS (Tailnet Access > Split DNS), KHÔNG hardcode ở
    # đây — headscale tự gọi dashboard (derp.dashboard.url, cùng secret Feature
    # B) mỗi lần build MapResponse, merge đè lên split tĩnh nếu có. Để trống là
    # đúng; sửa domain/nameserver trên CMS, không cần sửa + deploy lại file này.
    split: {}
  search_domains: []
  extra_records: []

# === ACL Policy ===
# database: cho phep dashboard (CMS) day nodeAttrs/grants (Taildrive per-PC share)
# qua PUT /api/v1/policy ma khong can sua + deploy lai file nay. `path` giu lai
# lam tham chieu (khong con doc khi mode=database), noi dung acl.json TRUOC KHI
# doi mode da duoc seed vao DB qua `headscale policy set --bypass...` (xem
# docs/DEPLOYMENT.md) de khong bi mat accept-all ACL + autoApprovers routes.
policy:
  mode: database
  path: /etc/headscale/acl.json

# === OIDC (đăng ký thiết bị tự động bằng Google) ===
# Thiết bị chạy `tailscale up --login-server=...` (KHÔNG cần authkey) → mở link
# /register/<key> → đăng nhập Google → tự đăng ký vào tailnet, khỏi chạy tay
# `headscale nodes register`. client_id/client_secret nạp qua biến môi trường
# HEADSCALE_OIDC_CLIENT_ID / HEADSCALE_OIDC_CLIENT_SECRET (xem docker-compose.yml,
# lấy từ .env) để KHÔNG commit secret vào repo public.
oidc:
  # false: nếu OIDC trục trặc, headscale vẫn khởi động phục vụ node cũ (an toàn).
  only_start_if_oidc_is_available: false
  issuer: "https://accounts.google.com"
  scope: ["openid", "profile", "email"]
  pkce:
    enabled: true
    method: S256
  # Chỉ các email dưới đây mới được đăng ký thiết bị qua Google:
  allowed_users:
    - hangocthanh3107@gmail.com
    - hangocthanhperu3107@gmail.com

# === Logging ===
log:
  level: info
  format: text

# === Tắt gửi log về Tailscale Inc ===
logtail:
  enabled: false

# === Misc ===
disable_check_updates: true

# === Unix socket ===
unix_socket: /var/run/headscale/headscale.sock
unix_socket_permission: "0770"
