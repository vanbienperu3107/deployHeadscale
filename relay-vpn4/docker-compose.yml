services:

  # Caddy: TLS termination cho vpn4.hangocthanh.io.vn:443 -> relay:8080.
  # Auto Let's Encrypt, khong can Pangolin/Traefik.
  caddy:
    image: caddy:2-alpine
    container_name: caddy-vpn4
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    command: caddy reverse-proxy --from vpn4.hangocthanh.io.vn --to http://relay:8080
    networks:
      - relay_net
    depends_on:
      - relay

  # Custom hybrid DERP relay — replaces standard derper.
  relay:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: relay-vpn4
    restart: unless-stopped
    command:
      - -addr=:8080
      - -ts-socket=/var/run/tailscale/tailscaled.sock
      - -key-file=/data/relay.key
      - -cache-ttl=5s
    ports:
      - "41641:41641/udp"
    volumes:
      - relay_data:/data
      - ts_sock:/var/run/tailscale
    networks:
      - relay_net
    depends_on:
      - tailscale

  # Tailscale sidecar — joins tailnet as "vpn4", relay queries LocalAPI for peer UDP endpoints.
  tailscale:
    image: tailscale/tailscale:latest
    container_name: ts-vpn4
    hostname: vpn4
    restart: unless-stopped
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY:-}
      - TS_EXTRA_ARGS=--login-server=https://vpn2.hangocthanh.io.vn --hostname=vpn4 --accept-dns=false
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
      - TS_SOCKET=/var/run/tailscale/tailscaled.sock
    volumes:
      - tailscale_vpn4:/var/lib/tailscale
      - ts_sock:/var/run/tailscale
    devices:
      - /dev/net/tun
    cap_add:
      - NET_ADMIN
    networks:
      - relay_net

  # Ping reporter — reports relay latency per peer via WireGuard.
  ping-reporter:
    image: python:3.12-slim
    container_name: ping-reporter-vpn4
    restart: unless-stopped
    command: ["python3", "/app/reporter.py"]
    network_mode: "service:tailscale"
    environment:
      - REPORTER_NAME=vpn4
      - TS_SOCKET=/var/run/tailscale/tailscaled.sock
      - POLL_INTERVAL=30
      - COLLECTOR_PORT=8090
      - PING_TIMEOUT=8
    volumes:
      - ../ping-reporter/reporter.py:/app/reporter.py:ro
      - ts_sock:/var/run/tailscale
    depends_on:
      - tailscale

networks:
  relay_net:
    driver: bridge

volumes:
  relay_data:
  tailscale_vpn4:
  ts_sock:
  caddy_data:
  caddy_config:
