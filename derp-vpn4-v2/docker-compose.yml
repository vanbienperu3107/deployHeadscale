services:
  # derper v1.100.0 - instance THU 2 tren cung host vpn4, domain rieng
  # (vpn5.hangocthanh.io.vn - xem docs/DERP-VPN4-V2-CUTOVER.md ve ly do va
  # cutover DNS tu server vpn5 cu 204.199.161.89).
  #
  # Steady-state: certmode=manual, doc cert da duoc bootstrap san trong
  # volume derper2_certs (xem step bootstrap trong workflow deploy). KHONG
  # bind port 80/443 - de nguyen ven instance derper cu (derp-vpn4, v1.80.0)
  # dang giu 2 port do cho domain vpn4.hangocthanh.io.vn.
  derper2:
    build:
      context: .
      dockerfile: Dockerfile.derper
    container_name: derper2
    restart: unless-stopped
    command:
      - --hostname=vpn5.hangocthanh.io.vn
      - --a=:8443
      - --http-port=8080
      - --certmode=manual
      - --certdir=/data/derper-certs
      - --stun
      - --stun-port=3478
      - --verify-clients=false
    ports:
      - "8443:8443"
      - "8080:8080"
      - "3479:3478/udp"
    volumes:
      - derper2_certs:/data/derper-certs

  # Tailscale sidecar: join tailnet voi hostname "vpn5" - de derper2 hien
  # trong danh sach "Node DERP / ha tang" cua headscale-admin nhu vpn3/
  # vpn4/vpn6 (truoc day KHONG co, dan toi khong thay tren dashboard).
  tailscale:
    image: tailscale/tailscale:latest
    container_name: ts-vpn5
    hostname: vpn5
    restart: unless-stopped
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY:-}
      - TS_EXTRA_ARGS=--login-server=https://vpn2.hangocthanh.io.vn --hostname=vpn5 --accept-dns=false
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
      - TS_SOCKET=/var/run/tailscale/tailscaled.sock
    volumes:
      - tailscale_vpn5:/var/lib/tailscale
      - ts_sock_vpn5:/var/run/tailscale
    devices:
      - /dev/net/tun
    cap_add:
      - NET_ADMIN

  # Ping-reporter: moi 30s ping tung peer, POST ket qua len collector voi
  # src='vpn5' - de co du lieu latency nhu cac relay khac tren dashboard.
  ping-reporter:
    image: python:3.12-slim
    container_name: ping-reporter-vpn5
    restart: unless-stopped
    network_mode: "service:tailscale"
    command: ["python3", "/app/reporter.py"]
    environment:
      - REPORTER_NAME=vpn5
      - TS_SOCKET=/var/run/tailscale/tailscaled.sock
      - POLL_INTERVAL=30
      - COLLECTOR_PORT=8090
      - PING_TIMEOUT=8
    volumes:
      - ../ping-reporter/reporter.py:/app/reporter.py:ro
      - ts_sock_vpn5:/var/run/tailscale
    depends_on:
      - tailscale

volumes:
  derper2_certs:
  tailscale_vpn5:
  ts_sock_vpn5:
