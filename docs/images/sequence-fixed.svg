<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 720" font-family="Segoe UI, Arial, sans-serif">
  <rect x="0" y="0" width="1060" height="720" fill="#ffffff"/>

  <!-- title -->
  <text x="530" y="28" text-anchor="middle" font-size="19" font-weight="700" fill="#0f172a">Sequence — FIXED: shared Netns A → POST đi qua tailscale0 → collector nhận data</text>

  <!-- ===================== ACTOR BOXES (6) ===================== -->
  <!-- positions (centers): 90, 260, 430, 600, 770, 960 -->
  <rect x="20" y="50" width="140" height="52" rx="8" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="90" y="72" text-anchor="middle" font-size="11" font-weight="700" fill="#bbf7d0">ping-reporter</text>
  <text x="90" y="89" text-anchor="middle" font-size="8.5" fill="#86efac">(Netns A shared)</text>

  <rect x="190" y="50" width="140" height="52" rx="8" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="260" y="74" text-anchor="middle" font-size="11" font-weight="700" fill="#bbf7d0">LocalAPI Socket</text>
  <text x="260" y="90" text-anchor="middle" font-size="8.5" fill="#86efac">unix volume</text>

  <rect x="360" y="50" width="140" height="52" rx="8" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="430" y="72" text-anchor="middle" font-size="11" font-weight="700" fill="#bbf7d0">Linux Kernel</text>
  <text x="430" y="89" text-anchor="middle" font-size="8.5" fill="#86efac">(Netns A — có WireGuard)</text>

  <rect x="530" y="50" width="140" height="52" rx="8" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="600" y="74" text-anchor="middle" font-size="11" font-weight="700" fill="#bbf7d0">tailscale0</text>
  <text x="600" y="90" text-anchor="middle" font-size="8.5" fill="#86efac">(WireGuard IF)</text>

  <rect x="700" y="50" width="140" height="52" rx="8" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="770" y="74" text-anchor="middle" font-size="11" font-weight="700" fill="#bbf7d0">ts-collector</text>
  <text x="770" y="90" text-anchor="middle" font-size="8.5" fill="#86efac">(vpn2 Netns C)</text>

  <rect x="890" y="50" width="150" height="52" rx="8" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="965" y="74" text-anchor="middle" font-size="11" font-weight="700" fill="#bbf7d0">collector :8090</text>
  <text x="965" y="90" text-anchor="middle" font-size="8.5" fill="#86efac">node-dedup</text>

  <!-- ===================== LIFELINES ===================== -->
  <line x1="90" y1="102" x2="90" y2="700" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5 5"/>
  <line x1="260" y1="102" x2="260" y2="700" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5 5"/>
  <line x1="430" y1="102" x2="430" y2="700" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5 5"/>
  <line x1="600" y1="102" x2="600" y2="700" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5 5"/>
  <line x1="770" y1="102" x2="770" y2="700" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5 5"/>
  <line x1="965" y1="102" x2="965" y2="700" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5 5"/>

  <!-- ===================== MESSAGES (all green) ===================== -->
  <!-- 1 -->
  <line x1="90" y1="140" x2="255" y2="140" stroke="#16a34a" stroke-width="2" marker-end="url(#gA)"/>
  <text x="98" y="133" font-size="10" font-weight="700" fill="#15803d">[1] GET /localapi/v0/status</text>
  <text x="98" y="154" font-size="8.5" fill="#16a34a">(dùng chung Netns A → socket OK)</text>

  <!-- 2 -->
  <line x1="260" y1="186" x2="95" y2="186" stroke="#16a34a" stroke-width="2" marker-end="url(#gA)"/>
  <text x="98" y="179" font-size="10" font-weight="700" fill="#15803d">[2] 200 OK: collector_ip=100.64.0.1</text>
  <text x="98" y="200" font-size="8.5" fill="#16a34a">peers=[itops, votam-pc...]</text>

  <!-- 3 -->
  <line x1="90" y1="232" x2="425" y2="232" stroke="#16a34a" stroke-width="2" marker-end="url(#gA)"/>
  <text x="150" y="225" font-size="10" font-weight="700" fill="#15803d">[3] TCP SYN → 100.64.0.1:8090</text>

  <!-- 4 -->
  <line x1="430" y1="278" x2="595" y2="278" stroke="#16a34a" stroke-width="2" marker-end="url(#gA)"/>
  <text x="438" y="271" font-size="10" font-weight="700" fill="#15803d">[4] route: 100.64.x.x via tailscale0 ✓</text>
  <text x="438" y="292" font-size="8.5" fill="#16a34a">→ encrypt packet, send UDP</text>

  <!-- 5 -->
  <line x1="600" y1="324" x2="765" y2="324" stroke="#16a34a" stroke-width="2" marker-end="url(#gA)"/>
  <text x="608" y="317" font-size="10" font-weight="700" fill="#15803d">[5] WireGuard encrypted UDP → ts-collector (vpn2)</text>
  <text x="608" y="338" font-size="8.5" fill="#16a34a">decrypt → forward :8090</text>

  <!-- 6 -->
  <line x1="770" y1="370" x2="960" y2="370" stroke="#16a34a" stroke-width="2" marker-end="url(#gA)"/>
  <text x="700" y="363" font-size="10" font-weight="700" fill="#15803d">[6] TCP forward to collector :8090</text>
  <text x="700" y="384" font-size="8.5" fill="#16a34a">(network_mode: service:tailscale on collector too)</text>

  <!-- 7 -->
  <line x1="965" y1="416" x2="775" y2="416" stroke="#16a34a" stroke-width="2" marker-end="url(#gA)"/>
  <text x="700" y="409" font-size="10" font-weight="700" fill="#15803d">[7] HTTP 200 OK</text>
  <text x="700" y="430" font-size="8.5" fill="#16a34a">{stored metrics}</text>

  <!-- 8 -->
  <line x1="770" y1="462" x2="605" y2="462" stroke="#16a34a" stroke-width="2" marker-end="url(#gA)"/>
  <text x="610" y="455" font-size="10" font-weight="700" fill="#15803d">[8] Response via WireGuard</text>

  <!-- 9 -->
  <line x1="600" y1="508" x2="95" y2="508" stroke="#16a34a" stroke-width="2" marker-end="url(#gA)"/>
  <text x="200" y="501" font-size="10" font-weight="700" fill="#15803d">[9] HTTP 200 OK ✓</text>

  <!-- 10: note on ping-reporter -->
  <rect x="30" y="538" width="290" height="50" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="40" y="558" font-size="9.5" font-weight="700" fill="#14532d">[10] [vpn4] ping 2/2 OK → collector OK</text>
  <text x="40" y="574" font-size="9.5" fill="#15803d">Sleep 30s → next cycle</text>

  <!-- 11: note on collector -->
  <rect x="820" y="600" width="220" height="58" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="830" y="620" font-size="9.5" font-weight="700" fill="#14532d">[11] Data stored!</text>
  <text x="830" y="636" font-size="9.5" fill="#15803d">Dashboard hiển thị</text>
  <text x="830" y="650" font-size="9.5" font-weight="700" fill="#15803d">vpn4 data ✓</text>

  <!-- markers -->
  <defs>
    <marker id="gA" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#16a34a"/>
    </marker>
  </defs>
</svg>
