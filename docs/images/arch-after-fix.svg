<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 660" font-family="Segoe UI, Arial, sans-serif">
  <!-- background -->
  <rect x="0" y="0" width="1100" height="660" fill="#ffffff"/>

  <!-- title -->
  <text x="550" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">SAU KHI FIX: ping-reporter chia sẻ Netns với ts-vpn4</text>
  <text x="550" y="56" text-anchor="middle" font-size="13" fill="#16a34a">network_mode: service:tailscale → ping-reporter có tailscale0 + route 100.64.x.x → POST thành công</text>

  <!-- ===================== LEFT SERVER: vpn4 ===================== -->
  <rect x="30" y="80" width="600" height="500" rx="14" fill="#1e293b"/>
  <text x="50" y="108" font-size="16" font-weight="700" fill="#e2e8f0">🖥 Server vpn4 — 149.104.66.174</text>

  <!-- derper container -->
  <rect x="50" y="124" width="150" height="50" rx="8" fill="#2563eb" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="125" y="148" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">derper</text>
  <text x="125" y="164" text-anchor="middle" font-size="10" fill="#dbeafe">DERP relay :443</text>

  <!-- ONE shared Netns A (green dashed) -->
  <rect x="50" y="190" width="540" height="372" rx="10" fill="#0f3d2e" stroke="#22c55e" stroke-width="2.5" stroke-dasharray="8 5"/>
  <text x="64" y="212" font-size="14" font-weight="700" fill="#4ade80">Network Namespace A (ts-vpn4 + ping-reporter dùng chung)</text>

  <!-- ts-vpn4 container -->
  <rect x="64" y="224" width="510" height="120" rx="8" fill="#14532d" stroke="#4ade80" stroke-width="1.5"/>
  <text x="78" y="246" font-size="13" font-weight="700" fill="#bbf7d0">ts-vpn4 (tailscale sidecar)</text>
  <text x="78" y="268" font-size="11" fill="#dcfce7">• tailscale0 — WireGuard IF</text>
  <text x="78" y="287" font-size="11" fill="#dcfce7">• 100.64.0.4/32</text>
  <text x="78" y="306" font-size="11" font-weight="700" fill="#86efac">• route: 100.64.x.x via tailscale0  ✓</text>
  <text x="78" y="328" font-size="10" fill="#86efac">cap_add NET_ADMIN · /dev/net/tun · /var/run/tailscale/tailscaled.sock</text>

  <!-- ping-reporter container (now inside the SAME green box) -->
  <rect x="64" y="356" width="510" height="190" rx="8" fill="#14532d" stroke="#4ade80" stroke-width="1.5"/>
  <text x="78" y="378" font-size="13" font-weight="700" fill="#bbf7d0">ping-reporter (vpn4)</text>
  <rect x="78" y="388" width="300" height="26" rx="5" fill="#065f46" stroke="#34d399" stroke-width="1"/>
  <text x="88" y="406" font-size="11" font-weight="700" fill="#a7f3d0">network_mode: service:tailscale</text>
  <text x="78" y="436" font-size="11" font-weight="700" fill="#86efac">✓ CÓ tailscale0 (chia sẻ từ ts-vpn4)</text>
  <text x="78" y="456" font-size="11" font-weight="700" fill="#86efac">✓ CÓ route 100.64.x.x via tailscale0</text>
  <text x="78" y="476" font-size="11" fill="#dcfce7">✓ LocalAPI socket OK (same ts_sock volume)</text>

  <!-- green POST arrow OUT -->
  <rect x="78" y="492" width="350" height="44" rx="6" fill="#065f46" stroke="#34d399" stroke-width="1.5"/>
  <text x="90" y="512" font-size="11" font-weight="700" fill="#a7f3d0">POST 100.64.0.1:8090  ✓ qua tailscale0</text>
  <text x="90" y="528" font-size="10" fill="#d1fae5">→ packet encrypted, đi vào WireGuard tunnel</text>
  <line x1="428" y1="514" x2="585" y2="514" stroke="#22c55e" stroke-width="2.5" marker-end="url(#greenArrow)"/>

  <!-- ===================== RIGHT SERVER: vpn2 ===================== -->
  <rect x="700" y="80" width="370" height="500" rx="14" fill="#1e293b"/>
  <text x="720" y="108" font-size="16" font-weight="700" fill="#e2e8f0">🖥 Server vpn2</text>
  <text x="720" y="126" font-size="12" fill="#94a3b8">headscale control + collector</text>

  <!-- Netns C (green dashed) -->
  <rect x="720" y="150" width="330" height="160" rx="10" fill="#0f3d2e" stroke="#22c55e" stroke-width="2.5" stroke-dasharray="8 5"/>
  <text x="734" y="172" font-size="13" font-weight="700" fill="#4ade80">Network Namespace C (ts-collector)</text>
  <rect x="734" y="184" width="302" height="112" rx="8" fill="#14532d" stroke="#4ade80" stroke-width="1.5"/>
  <text x="748" y="206" font-size="12" font-weight="700" fill="#bbf7d0">ts-collector (tailscale sidecar)</text>
  <text x="748" y="227" font-size="11" fill="#dcfce7">• tailscale0 — WireGuard IF</text>
  <text x="748" y="246" font-size="11" fill="#dcfce7">• 100.64.0.1/32</text>
  <text x="748" y="265" font-size="11" fill="#dcfce7">• TCP :8090 listening</text>
  <text x="748" y="285" font-size="10" fill="#86efac">route 100.64.x.x via tailscale0</text>

  <!-- collector app -->
  <rect x="720" y="330" width="330" height="80" rx="8" fill="#2563eb" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="885" y="356" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">collector (node-dedup)</text>
  <text x="885" y="378" text-anchor="middle" font-size="11" fill="#dbeafe">POST /metrics/report → store</text>
  <text x="885" y="396" text-anchor="middle" font-size="10" fill="#bfdbfe">network_mode: service:tailscale</text>

  <!-- ===================== WireGuard tunnel (solid green path with HTTP 200) ===================== -->
  <path d="M 585 514 C 660 514, 660 234, 720 234" fill="none" stroke="#22c55e" stroke-width="3.5" marker-end="url(#greenArrowBig)"/>
  <rect x="455" y="240" width="210" height="48" rx="6" fill="#064e3b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="560" y="259" text-anchor="middle" font-size="11" font-weight="700" fill="#a7f3d0">WireGuard UDP tunnel</text>
  <text x="560" y="274" text-anchor="middle" font-size="11" font-weight="700" fill="#bbf7d0">HTTP 200 OK ✓</text>
  <text x="560" y="285" text-anchor="middle" font-size="9" fill="#86efac">ts-vpn4 ↔ ts-collector</text>

  <!-- success note -->
  <text x="500" y="615" text-anchor="middle" font-size="12" font-weight="700" fill="#16a34a">Luồng hoạt động END-TO-END: ping-reporter → tailscale0 → WireGuard → ts-collector → collector :8090 → HTTP 200.</text>

  <!-- ===================== LEGEND ===================== -->
  <rect x="30" y="600" width="430" height="48" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="44" y1="616" x2="74" y2="616" stroke="#22c55e" stroke-width="3" stroke-dasharray="6 4"/>
  <text x="80" y="620" font-size="10" fill="#334155">Netns có WireGuard (shared)</text>
  <line x1="44" y1="634" x2="74" y2="634" stroke="#22c55e" stroke-width="3"/>
  <text x="80" y="638" font-size="10" fill="#334155">luồng dữ liệu thành công</text>
  <line x1="240" y1="625" x2="270" y2="625" stroke="#34d399" stroke-width="3"/>
  <text x="276" y="629" font-size="10" fill="#334155">unix socket (volume) OK</text>

  <!-- arrow markers -->
  <defs>
    <marker id="greenArrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#22c55e"/>
    </marker>
    <marker id="greenArrowBig" markerWidth="12" markerHeight="12" refX="7" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#22c55e"/>
    </marker>
  </defs>
</svg>
