<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" font-family="Segoe UI, Arial, sans-serif">
  <rect x="0" y="0" width="960" height="640" fill="#ffffff"/>

  <!-- title -->
  <text x="480" y="28" text-anchor="middle" font-size="19" font-weight="700" fill="#0f172a">Sequence — BROKEN: socket OK nhưng TCP tới collector bị kernel drop</text>

  <!-- ===================== ACTOR BOXES ===================== -->
  <!-- 1: ping-reporter -->
  <rect x="30" y="50" width="140" height="50" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="100" y="72" text-anchor="middle" font-size="12" font-weight="700" fill="#e2e8f0">ping-reporter</text>
  <text x="100" y="89" text-anchor="middle" font-size="9" fill="#94a3b8">(Netns B riêng)</text>

  <!-- 2: LocalAPI Socket -->
  <rect x="270" y="50" width="140" height="50" rx="8" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="340" y="70" text-anchor="middle" font-size="12" font-weight="700" fill="#bbf7d0">LocalAPI Socket</text>
  <text x="340" y="86" text-anchor="middle" font-size="8" fill="#86efac">/var/run/tailscale (volume)</text>

  <!-- 3: Linux Kernel -->
  <rect x="510" y="50" width="140" height="50" rx="8" fill="#7f1d1d" stroke="#ef4444" stroke-width="1.5"/>
  <text x="580" y="70" text-anchor="middle" font-size="12" font-weight="700" fill="#fecaca">Linux Kernel</text>
  <text x="580" y="86" text-anchor="middle" font-size="9" fill="#fca5a5">(Netns B routing)</text>

  <!-- 4: collector -->
  <rect x="750" y="50" width="140" height="50" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="820" y="70" text-anchor="middle" font-size="12" font-weight="700" fill="#e2e8f0">collector :8090</text>
  <text x="820" y="86" text-anchor="middle" font-size="9" fill="#94a3b8">(vpn2, 100.64.0.1)</text>

  <!-- ===================== LIFELINES ===================== -->
  <line x1="100" y1="100" x2="100" y2="615" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5 5"/>
  <line x1="340" y1="100" x2="340" y2="615" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5 5"/>
  <line x1="580" y1="100" x2="580" y2="615" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5 5"/>
  <line x1="820" y1="100" x2="820" y2="615" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5 5"/>

  <!-- red dotted vertical separator between "works" and "fails" -->
  <line x1="235" y1="115" x2="235" y2="615" stroke="#ef4444" stroke-width="2" stroke-dasharray="3 6"/>
  <text x="160" y="128" text-anchor="middle" font-size="10" font-weight="700" fill="#16a34a">◄ WORKS</text>
  <text x="310" y="128" text-anchor="middle" font-size="10" font-weight="700" fill="#dc2626">FAILS ►</text>

  <!-- ===================== MESSAGES ===================== -->
  <!-- Step 1: ping-reporter -> LocalAPI (green) -->
  <line x1="100" y1="155" x2="335" y2="155" stroke="#16a34a" stroke-width="2" marker-end="url(#gA)"/>
  <text x="110" y="148" font-size="10" font-weight="700" fill="#15803d">[1] GET /localapi/v0/status</text>
  <text x="110" y="170" font-size="9" fill="#16a34a">(unix HTTP request via volume socket)</text>

  <!-- Step 2: LocalAPI -> ping-reporter (green) -->
  <line x1="340" y1="200" x2="105" y2="200" stroke="#16a34a" stroke-width="2" marker-end="url(#gA)"/>
  <text x="110" y="193" font-size="10" font-weight="700" fill="#15803d">[2] 200 OK: peers=[], collector_ip=100.64.0.1</text>
  <text x="110" y="215" font-size="9" fill="#16a34a">(socket accessible OK — volume mount works)</text>

  <!-- Step 3: self note on ping-reporter -->
  <rect x="50" y="232" width="200" height="40" rx="6" fill="#fef9c3" stroke="#ca8a04" stroke-width="1"/>
  <text x="60" y="250" font-size="9.5" fill="#713f12">[3] Loop peers, run ping subprocess</text>
  <text x="60" y="264" font-size="9.5" fill="#713f12">for each non-collector peer</text>

  <!-- Step 4: ping-reporter -> Kernel (red) -->
  <line x1="100" y1="300" x2="575" y2="300" stroke="#dc2626" stroke-width="2" marker-end="url(#rA)"/>
  <text x="160" y="293" font-size="10" font-weight="700" fill="#b91c1c">[4] TCP SYN → 100.64.0.1:8090</text>
  <text x="160" y="315" font-size="9" fill="#dc2626">(POST /metrics/report)</text>

  <!-- Step 5: Kernel self note (red) -->
  <rect x="470" y="332" width="240" height="50" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="1"/>
  <text x="480" y="350" font-size="9.5" font-weight="700" fill="#7f1d1d">[5] lookup route 100.64.0.1 in Netns B:</text>
  <text x="480" y="365" font-size="9.5" fill="#991b1b">NO tailscale0,</text>
  <text x="480" y="378" font-size="9.5" fill="#991b1b">NO 100.64.x.x route</text>

  <!-- Step 6: Kernel -> ping-reporter (red) -->
  <line x1="580" y1="415" x2="105" y2="415" stroke="#dc2626" stroke-width="2" marker-end="url(#rA)"/>
  <text x="160" y="408" font-size="10" font-weight="700" fill="#b91c1c">[6] OSError(113, 'No route to host')</text>
  <text x="160" y="430" font-size="9" fill="#dc2626">EHOSTUNREACH — packet dropped</text>

  <!-- Step 7: note on ping-reporter (red) -->
  <rect x="50" y="448" width="240" height="50" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="1"/>
  <text x="60" y="466" font-size="9.5" font-weight="700" fill="#7f1d1d">[7] POST failed. Sleep 30s. Retry loop.</text>
  <text x="60" y="482" font-size="9.5" fill="#991b1b">collector receives NOTHING</text>

  <!-- Step 8: collector note box (red) -->
  <rect x="720" y="520" width="200" height="56" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="730" y="540" font-size="9.5" font-weight="700" fill="#7f1d1d">[8] Không nhận được data</text>
  <text x="730" y="556" font-size="9.5" fill="#991b1b">Dashboard:</text>
  <text x="730" y="569" font-size="9.5" font-weight="700" fill="#991b1b">"chưa có dữ liệu"</text>

  <!-- markers -->
  <defs>
    <marker id="gA" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#16a34a"/>
    </marker>
    <marker id="rA" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#dc2626"/>
    </marker>
  </defs>
</svg>
