name: Deploy DERP (vpn4-v2, derper v1.100.0)

# Instance derper THU 2 tren host vpn4, domain vpn5.hangocthanh.io.vn
# (cutover tu server vpn5 cu - xem docs/DERP-VPN4-V2-CUTOVER.md).
# Chay sau khi CI pass tren main, hoac chay tay.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  # Chung group voi deploy-derp-vpn4.yml - xem giai thich trong file do.
  group: deploy-vpn4-host
  cancel-in-progress: false

jobs:
  deploy-derp-v2:
    name: Deploy DERP v1.100.0 relay (derper2) len vpn4
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Lay TS_AUTHKEY tu headscale API cho sidecar vpn5 (chay tren runner, khong qua SSH)
        id: ts_key
        env:
          HS_API_KEY: ${{ secrets.HEADPLANE_HS_API_KEY }}
        run: |
          RESPONSE=$(curl -sf -m 15 \
            -H "Authorization: Bearer $HS_API_KEY" \
            "https://vpn2.hangocthanh.io.vn/api/v1/user" 2>/dev/null \
            || echo '{"users":[]}')
          USER_ID=$(echo "$RESPONSE" | python3 -c \
            "import json,sys; d=json.load(sys.stdin); u=d.get('users',d.get('user',[])); print(int(u[0].get('id',0)) if isinstance(u,list) and u else '')" \
            2>/dev/null || echo "")
          USER_NAME=$(echo "$RESPONSE" | python3 -c \
            "import json,sys; d=json.load(sys.stdin); u=d.get('users',d.get('user',[])); print(u[0].get('name','') if isinstance(u,list) and u else '')" \
            2>/dev/null || echo "")
          echo "headscale user: '$USER_NAME' (id=$USER_ID)"
          EXPIRY=$(date -d '+365 days' -u +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || echo "")
          KEY=""
          if [ -n "$USER_ID" ] && [ "$USER_ID" != "0" ]; then
            PKEY_RESP=$(curl -sf -m 15 -X POST \
              -H "Authorization: Bearer $HS_API_KEY" \
              -H "Content-Type: application/json" \
              -d "{\"user\":$USER_ID,\"reusable\":true,\"expiration\":\"$EXPIRY\"}" \
              "https://vpn2.hangocthanh.io.vn/api/v1/preauthkey" 2>/dev/null || echo "")
            KEY=$(echo "$PKEY_RESP" | python3 -c \
              "import json,sys; d=json.load(sys.stdin); print(d.get('preAuthKey',{}).get('key','') or d.get('key',''))" \
              2>/dev/null || echo "")
          fi
          if [ -n "$KEY" ]; then
            echo "::add-mask::$KEY"
            echo "Tao preauthkey thanh cong (user=$USER_NAME id=$USER_ID)"
          else
            echo "Khong tao duoc preauthkey (user=$USER_NAME id=$USER_ID)"
          fi
          echo "key=$KEY" >> "$GITHUB_OUTPUT"

      - name: SSH vao vpn4 va deploy derper2 (v1.100.0)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST_VPN4 }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          envs: DEPLOY_PATH,REPO_URL,TS_AUTHKEY
          script_stop: true
          command_timeout: 20m
          script: |
            echo "==> [1/5] Cap nhat repo (dung chung checkout voi derp-vpn4)"
            cd "$DEPLOY_PATH"
            git fetch --all --prune
            git reset --hard origin/main
            chmod +x "$DEPLOY_PATH/derp-vpn4-v2/deploy.sh"
            bash "$DEPLOY_PATH/derp-vpn4-v2/deploy.sh"
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          REPO_URL: https://github.com/vanbienperu3107/deployHeadscale.git
          TS_AUTHKEY: ${{ steps.ts_key.outputs.key }}
