name: Deploy DERP (vpn3)

# Chay sau khi CI pass tren main. Co the chay tay.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-derp-vpn3
  cancel-in-progress: false

jobs:
  deploy-derp:
    name: Deploy DERP relay to vpn3
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: SSH vao vpn3 va deploy DERP relay + tailscale + ping-reporter
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST_VPN3 }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          envs: DEPLOY_PATH,REPO_URL,HS_API_KEY
          script_stop: true
          command_timeout: 30m
          script: |
            set -e
            if [ "$(id -u)" -ne 0 ]; then SUDO="sudo"; else SUDO=""; fi

            echo "==> [0/5] Cho dpkg lock giai phong"
            $SUDO systemctl stop unattended-upgrades 2>/dev/null || true
            $SUDO systemctl stop apt-daily.service apt-daily-upgrade.service 2>/dev/null || true
            i=0
            while flock -n /var/lib/dpkg/lock-frontend -c true 2>/dev/null; [ $? -ne 0 ] && [ $i -lt 30 ]; do
              echo "  dpkg busy, cho 5s... ($i)"; sleep 5; i=$((i+1))
            done

            echo "==> [1/5] Cai git + docker neu thieu"
            if ! command -v git >/dev/null 2>&1; then
              DEBIAN_FRONTEND=noninteractive $SUDO apt-get update -y
              DEBIAN_FRONTEND=noninteractive $SUDO apt-get install -y git
            fi
            if ! command -v docker >/dev/null 2>&1; then
              curl -fsSL https://get.docker.com -o /tmp/install-docker.sh
              DEBIAN_FRONTEND=noninteractive $SUDO sh /tmp/install-docker.sh
              rm -f /tmp/install-docker.sh
            fi
            $SUDO systemctl enable --now docker 2>/dev/null || true

            echo "==> [2/5] Clone/cap nhat repo"
            if [ ! -d "$DEPLOY_PATH/.git" ]; then
              $SUDO mkdir -p "$DEPLOY_PATH"
              $SUDO git clone "$REPO_URL" "$DEPLOY_PATH"
              $SUDO chown -R "$(id -un):$(id -gn)" "$DEPLOY_PATH"
            fi
            cd "$DEPLOY_PATH"
            git config --global --add safe.directory "$DEPLOY_PATH" || true
            git fetch --all --prune
            git reset --hard origin/main

            echo "==> [3/5] Lay hoac tao TS_AUTHKEY cho tailscale vpn3"
            TS_AUTHKEY=""
            # 1. Thu file .ts_authkey da luu tren VPS nay tu lan truoc
            if [ -f "$DEPLOY_PATH/.ts_authkey" ]; then
              TS_AUTHKEY=$(cat "$DEPLOY_PATH/.ts_authkey")
              echo "  Dung .ts_authkey da luu: ${TS_AUTHKEY:0:8}..."
            fi
            # 2. Tu tao via headscale API - chay trong subshell de tranh set-e
            rm -f /tmp/ts_key_final.txt
            (
              set +e
              echo "  Subshell: bat dau lay key (HS_API_KEY set=${HS_API_KEY:+yes})"
              EXPIRY=$(date -d '+365 days' -u +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || echo "")
              curl -sf -m 15 -H "Authorization: Bearer $HS_API_KEY" \
                "https://vpn2.hangocthanh.io.vn/api/v1/user" \
                -o /tmp/hs_users.json 2>/tmp/curl_users_err.txt
              CURL_EXIT=$?
              echo "  Subshell: curl users exit=$CURL_EXIT resp=$(head -c 200 /tmp/hs_users.json 2>/dev/null)"
              if [ "$CURL_EXIT" != "0" ]; then
                echo "  Subshell: curl loi $(cat /tmp/curl_users_err.txt 2>/dev/null | head -c 100)"
                printf '{"users":[]}' > /tmp/hs_users.json
              fi
              python3 -c "import json; d=json.load(open('/tmp/hs_users.json')); u=d.get('users',d.get('user',[])); print(u[0]['name'] if isinstance(u,list) and u else '')" 2>/dev/null > /tmp/hs_uname.txt
              U_NAME=$(cat /tmp/hs_uname.txt 2>/dev/null | tr -d '\n\r')
              echo "  Subshell: U_NAME='$U_NAME' EXPIRY='$EXPIRY'"
              if [ -n "$U_NAME" ]; then
                curl -sf -m 15 -X POST \
                  -H "Authorization: Bearer $HS_API_KEY" \
                  -H "Content-Type: application/json" \
                  -d "{\"user\":\"$U_NAME\",\"reusable\":true,\"expiration\":\"$EXPIRY\"}" \
                  "https://vpn2.hangocthanh.io.vn/api/v1/preauthkey" \
                  -o /tmp/hs_preauthkey.json 2>/tmp/curl_key_err.txt
                CURL_KEY_EXIT=$?
                echo "  Subshell: curl preauthkey exit=$CURL_KEY_EXIT resp=$(head -c 200 /tmp/hs_preauthkey.json 2>/dev/null)"
                if [ "$CURL_KEY_EXIT" != "0" ]; then
                  echo "  Subshell: curl key loi $(cat /tmp/curl_key_err.txt 2>/dev/null | head -c 100)"
                fi
                python3 -c "import json; d=json.load(open('/tmp/hs_preauthkey.json')); print(d.get('preAuthKey',{}).get('key','') or d.get('key',''))" 2>/dev/null > /tmp/hs_key.txt
                TS_KEY=$(cat /tmp/hs_key.txt 2>/dev/null | tr -d '\n\r')
                if [ -n "$TS_KEY" ]; then
                  echo "$TS_KEY" > /tmp/ts_key_final.txt
                  echo "  Subshell: da luu key (user=$U_NAME)"
                else
                  echo "  Subshell: khong co key trong response"
                fi
              else
                echo "  Subshell: CANH BAO khong tim thay user"
              fi
              exit 0
            ) || true
            if [ -f /tmp/ts_key_final.txt ]; then
              TS_AUTHKEY=$(cat /tmp/ts_key_final.txt | tr -d '\n\r')
              printf '%s' "$TS_AUTHKEY" > "$DEPLOY_PATH/.ts_authkey"
              chmod 600 "$DEPLOY_PATH/.ts_authkey"
              echo "  Key da luu vao .ts_authkey"
            else
              echo "  Khong tao duoc key moi, dung key cu hoac bo trong"
            fi

            # Ghi .env (TS_AUTHKEY de compose doc khi khoi dong tailscale sidecar)
            umask 077
            printf 'TS_AUTHKEY=%s\n' "${TS_AUTHKEY:-}" > "$DEPLOY_PATH/derp-vpn3/.env"
            echo "  .env da ghi (key KHONG in ra log)"

            echo "==> [4/5] Khoi dong DERP relay + tailscale + ping-reporter"
            cd "$DEPLOY_PATH/derp-vpn3"
            # Xoa socket cu neu con (tranh tailscaled.sock la symlink -> /tmp)
            $SUDO docker compose run --rm --no-deps --entrypoint sh tailscale \
              -c 'rm -f /var/run/tailscale/tailscaled.sock' >/dev/null 2>&1 || true
            $SUDO docker compose pull 2>/dev/null || true
            $SUDO docker compose up -d --build --force-recreate --remove-orphans

            echo "==> [5/5] Kiem tra health"
            sleep 10
            $SUDO docker compose ps

            echo "  Kiem tra DERP relay /derp/probe (toi da 90s)..."
            for _ in $(seq 1 15); do
              CODE=$(curl -sk -o /dev/null -w "%{http_code}" \
                "https://vpn3.hangocthanh.io.vn/derp/probe" 2>/dev/null || echo 000)
              echo "  /derp/probe: HTTP $CODE"
              [ "$CODE" = "200" ] && break
              sleep 6
            done

            echo "  Kiem tra tailscale vpn3 join tailnet..."
            for _ in $(seq 1 15); do
              IP=$($SUDO docker exec ts-vpn3 tailscale ip -4 2>/dev/null || true)
              if [ -n "$IP" ]; then
                echo "  vpn3 DA join tailnet: $IP"; break
              fi
              echo "  Chua join, cho 4s..."
              sleep 4
            done

            echo "  Log ping-reporter-vpn3 (dau 30 dong):"
            sleep 5
            $SUDO docker logs --tail 30 ping-reporter-vpn3 2>&1 || true
            echo "  Log ts-vpn3 (dau 15 dong):"
            $SUDO docker logs --tail 15 ts-vpn3 2>&1 || true
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          REPO_URL: https://github.com/vanbienperu3107/deployHeadscale.git
          HS_API_KEY: ${{ secrets.HEADPLANE_HS_API_KEY }}
