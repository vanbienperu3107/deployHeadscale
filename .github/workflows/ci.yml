name: CI

# Kiểm tra cú pháp cấu hình trên mọi push và pull request.
on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  validate:
    name: Validate config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: docker compose -f docker-compose.yml config --quiet && echo "docker-compose.yml OK"

      - name: Validate config/config.yaml (YAML)
        run: python3 -c "import yaml; yaml.safe_load(open('config/config.yaml')); print('config.yaml OK')"

      - name: Validate config/acl.json (JSON)
        run: python3 -c "import json; json.load(open('config/acl.json')); print('acl.json OK')"

      - name: Test node-dedup logic (pytest)
        run: |
          python3 -m venv /tmp/venv
          /tmp/venv/bin/pip install --quiet pytest
          cd node-dedup && /tmp/venv/bin/python -m pytest -q test_dedup.py

      - name: Validate Caddyfile (custom caddy w/ replace-response plugin)
        run: |
          # Build image Caddy co plugin replace-response de directive `replace`
          # duoc nhan dien khi validate (caddy:2 stock se bao loi directive la).
          docker build -t caddy-custom ./caddy
          docker run --rm -v "${{ github.workspace }}/Caddyfile:/etc/caddy/Caddyfile:ro" \
            caddy-custom caddy validate --adapter caddyfile --config /etc/caddy/Caddyfile

      - name: Scan secret bị commit nhầm
        # Bỏ qua *.md (tài liệu được phép nhắc tới chuỗi này), vẫn quét file config/key thật.
        run: |
          if grep -rIl --exclude-dir=.git --exclude='*.md' -E 'BEGIN [A-Z ]*PRIVATE KEY' .; then
            echo "::error::Phát hiện private key bị commit vào repo!"
            exit 1
          fi
          echo "OK: không tìm thấy private key trong repo."

  derp-config:
    name: DERP config validate (derp.yaml + failover setup)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate config/derp.yaml (YAML syntax)
        run: python3 -c "import yaml; yaml.safe_load(open('config/derp.yaml')); print('derp.yaml OK')"

      - name: Validate derp-vpn3/docker-compose.yml
        run: docker compose -f derp-vpn3/docker-compose.yml config --quiet && echo "derp-vpn3/docker-compose.yml OK"

      - name: Validate derp-vpn4/docker-compose.yml
        run: docker compose -f derp-vpn4/docker-compose.yml config --quiet && echo "derp-vpn4/docker-compose.yml OK"

      - name: Validate derp-vpn4-v2/docker-compose.yml
        run: docker compose -f derp-vpn4-v2/docker-compose.yml config --quiet && echo "derp-vpn4-v2/docker-compose.yml OK"

      - name: Test DERP config structure + failover (pytest)
        run: |
          python3 -m venv /tmp/venv-derp
          /tmp/venv-derp/bin/pip install --quiet pytest pyyaml
          /tmp/venv-derp/bin/python -m pytest -q test/test_derp_config.py

  derp-integration:
    name: DERP integration (build derper + health probe)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build derper + kiem tra /derp/probe
        run: bash test/derp_integration.sh

  stats-integration:
    name: /stats integration (collector tach khoi sidecar)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Chung minh /stats tra 200 qua Caddy -> node-dedup KHI KHONG CO tailscale
      # sidecar (kich ban tung gay 502 connection refused). Phai PASS sau khi tach
      # node-dedup thanh container rieng.
      - name: Integration test /stats (khong sidecar)
        run: bash test/stats_integration.sh

  ping-reporter-test:
    name: ping-reporter — pytest (get_peers_and_collector)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run reporter unit tests
        run: |
          python3 -m venv /tmp/venv-reporter
          /tmp/venv-reporter/bin/pip install --quiet pytest
          cd ping-reporter && /tmp/venv-reporter/bin/python -m pytest -q test_reporter.py

  relay-vpn5-build:
    name: relay-vpn5 — Go build + vet + compose validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go 1.24
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: relay-vpn5/go.mod

      - name: go mod tidy
        working-directory: relay-vpn5
        env:
          GONOSUMDB: "*"
          GOTELEMETRY: "off"
        run: go mod tidy

      - name: go build (kiem tra bien dich thanh cong)
        working-directory: relay-vpn5
        run: go build ./...

      - name: go vet (static analysis)
        working-directory: relay-vpn5
        run: go vet ./...

      - name: Validate relay-vpn5/docker-compose.yml
        run: docker compose -f relay-vpn5/docker-compose.yml config --quiet && echo "relay-vpn5/docker-compose.yml OK"

      - name: Validate config/derp.yaml bao gom region 1002 (vpn5)
        run: |
          python3 -c "
          import yaml, sys
          d = yaml.safe_load(open('config/derp.yaml'))
          regions = d.get('regions', {})
          assert 1002 in regions, 'region 1002 (vpn5) chua co trong derp.yaml'
          r = regions[1002]
          # Cutover 2026-07-02: vpn5 chay tren host vpn4, port rieng 8443
          # (80/443 da bi derp-vpn4 chiem). Xem docs/DERP-VPN4-V2-CUTOVER.md.
          assert r['nodes'][0]['derpport'] == 8443, 'derpport phai la 8443'
          print('derp.yaml region 1002 OK:', r['regionname'])
          "

      - name: Scan secret trong relay-vpn5
        run: |
          if grep -rIl --exclude-dir=.git --exclude='*.md' -E 'BEGIN [A-Z ]*PRIVATE KEY' relay-vpn5/; then
            echo "::error::Private key bi commit vao relay-vpn5!"
            exit 1
          fi
          echo "OK: khong tim thay private key trong relay-vpn5."
