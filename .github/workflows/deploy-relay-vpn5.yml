name: Deploy Relay (vpn5)

# CHI CHAY KHI DUOC GOI TAY — khong tu dong sau CI.
# Yeu cau: CI pass tren main truoc khi bam Run workflow.
on:
  workflow_dispatch:

concurrency:
  group: deploy-relay-vpn5
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy hybrid relay to vpn5
    runs-on: ubuntu-latest
    steps:
      - name: SSH vao vpn5 va deploy relay + tailscale + ping-reporter
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST_VPN5 }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -e
            if [ "$(id -u)" -ne 0 ]; then SUDO="sudo"; else SUDO=""; fi

            echo "==> [0/6] Cho dpkg lock giai phong"
            $SUDO systemctl stop unattended-upgrades 2>/dev/null || true
            $SUDO systemctl stop apt-daily.service apt-daily-upgrade.service 2>/dev/null || true
            i=0
            while flock -n /var/lib/dpkg/lock-frontend -c true 2>/dev/null; [ $? -ne 0 ] && [ $i -lt 30 ]; do
              echo "  dpkg busy, cho 5s... ($i)"; sleep 5; i=$((i+1))
            done

            echo "==> [1/6] Cai git + docker neu thieu"
            if ! command -v git >/dev/null 2>&1; then
              DEBIAN_FRONTEND=noninteractive $SUDO apt-get update -y
              DEBIAN_FRONTEND=noninteractive $SUDO apt-get install -y git
            fi
            if ! command -v docker >/dev/null 2>&1; then
              curl -fsSL https://get.docker.com -o /tmp/install-docker.sh
              DEBIAN_FRONTEND=noninteractive $SUDO sh /tmp/install-docker.sh
              rm -f /tmp/install-docker.sh
            fi
            $SUDO systemctl enable --now docker 2>/dev/null || true

            echo "==> [2/6] Clone/cap nhat repo"
            DEPLOY_PATH="${DEPLOY_PATH:-$HOME/deployHeadscale}"
            REPO_URL="https://github.com/vanbienperu3107/deployHeadscale.git"
            if [ ! -d "$DEPLOY_PATH/.git" ]; then
              $SUDO mkdir -p "$DEPLOY_PATH"
              $SUDO git clone "$REPO_URL" "$DEPLOY_PATH"
              $SUDO chown -R "$(id -un):$(id -gn)" "$DEPLOY_PATH"
            fi
            cd "$DEPLOY_PATH"
            git config --global --add safe.directory "$DEPLOY_PATH" || true
            git fetch --all --prune
            git reset --hard origin/main

            echo "==> [3/6] Lay hoac tao TS_AUTHKEY cho tailscale vpn5"
            TS_AUTHKEY=""
            if [ -f "$DEPLOY_PATH/.ts_authkey_vpn5" ]; then
              TS_AUTHKEY=$(cat "$DEPLOY_PATH/.ts_authkey_vpn5")
              echo "  Dung .ts_authkey_vpn5 da luu"
            fi
            if [ -z "$TS_AUTHKEY" ] && [ -n "$HS_API_KEY" ]; then
              echo "  Chua co key -> tu tao via headscale API"
              EXPIRY=$(date -d '+365 days' -u +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || \
                       date -u -v +365d +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || echo "")
              USERS=$(curl -sf -H "Authorization: Bearer $HS_API_KEY" \
                "https://vpn2.hangocthanh.io.vn/api/v1/user" 2>/dev/null || echo '{}')
              U_NAME=$(printf '%s' "$USERS" | grep -oE '"name":"[^"]+"' | head -1 | \
                sed -E 's/"name":"//;s/"$//')
              if [ -n "$U_NAME" ] && [ -n "$EXPIRY" ]; then
                RESP=$(curl -sf -X POST \
                  -H "Authorization: Bearer $HS_API_KEY" \
                  -H "Content-Type: application/json" \
                  -d "{\"user\":\"$U_NAME\",\"reusable\":true,\"expiration\":\"$EXPIRY\"}" \
                  "https://vpn2.hangocthanh.io.vn/api/v1/preauthkey" 2>/dev/null || echo '{}')
                TS_AUTHKEY=$(printf '%s' "$RESP" | grep -oE '"key":"[^"]+"' | head -1 | \
                  sed -E 's/"key":"//;s/"$//')
                if [ -n "$TS_AUTHKEY" ]; then
                  printf '%s' "$TS_AUTHKEY" > "$DEPLOY_PATH/.ts_authkey_vpn5"
                  chmod 600 "$DEPLOY_PATH/.ts_authkey_vpn5"
                  echo "  Tao key OK (user=$U_NAME)"
                fi
              fi
            fi
            umask 077
            printf 'TS_AUTHKEY=%s\n' "${TS_AUTHKEY:-}" > "$DEPLOY_PATH/relay-vpn5/.env"
            echo "  .env da ghi"

            echo "==> [4/6] Cap nhat Traefik config (directory mode)"
            # Pangolin Traefik phai dang chay o directory provider mode.
            # Kiem tra truoc; neu van la filename mode thi switch sang directory.
            TRAEFIK_CFG=$(docker inspect pan-traefik 2>/dev/null | \
              grep -oE '"Source":"[^"]+traefik[^"]+\.yml"' | head -1 | \
              grep -oE '/[^"]+' || echo "")
            if [ -n "$TRAEFIK_CFG" ]; then
              TRAEFIK_DIR=$(dirname "$TRAEFIK_CFG")
              # Copy relay dynamic config vao cung thu muc
              $SUDO cp "$DEPLOY_PATH/relay-vpn5/traefik-relay-vpn5.yml" \
                "$TRAEFIK_DIR/traefik-relay-vpn5.yml" 2>/dev/null || \
              docker cp "$DEPLOY_PATH/relay-vpn5/traefik-relay-vpn5.yml" \
                "pan-traefik:/data/traefik-relay-vpn5.yml" 2>/dev/null || \
              echo "  WARN: khong copy duoc Traefik config — kiem tra thu cong"
            else
              echo "  WARN: khong tim duoc Traefik config path — kiem tra thu cong"
            fi

            echo "==> [5/6] Khoi dong relay + tailscale + ping-reporter"
            cd "$DEPLOY_PATH/relay-vpn5"
            $SUDO docker compose run --rm --no-deps --entrypoint sh tailscale \
              -c 'rm -f /var/run/tailscale/tailscaled.sock' >/dev/null 2>&1 || true
            $SUDO docker compose pull tailscale 2>/dev/null || true
            $SUDO docker compose up -d --build --force-recreate --remove-orphans

            echo "==> [6/6] Kiem tra health"
            sleep 15
            $SUDO docker compose ps

            echo "  Kiem tra relay /relay/probe (toi da 90s)..."
            for _ in $(seq 1 15); do
              CODE=$(curl -sk -o /dev/null -w "%{http_code}" \
                "https://vpn5.hangocthanh.io.vn/relay/probe" 2>/dev/null || echo 000)
              echo "  /relay/probe: HTTP $CODE"
              [ "$CODE" = "200" ] && break
              sleep 6
            done

            echo "  Kiem tra tailscale vpn5 join tailnet..."
            for _ in $(seq 1 15); do
              IP=$($SUDO docker exec ts-vpn5 tailscale ip -4 2>/dev/null || true)
              if [ -n "$IP" ]; then
                echo "  vpn5 DA join tailnet: $IP"; break
              fi
              echo "  Chua join, cho 4s..."; sleep 4
            done

            echo "  Log relay-vpn5 (30 dong cuoi):"
            $SUDO docker logs --tail 30 relay-vpn5 2>&1 || true
            echo "  Log ts-vpn5 (15 dong cuoi):"
            $SUDO docker logs --tail 15 ts-vpn5 2>&1 || true
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          HS_API_KEY: ${{ secrets.HEADPLANE_HS_API_KEY }}
