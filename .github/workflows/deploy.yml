name: Deploy

# Chạy tự động SAU KHI workflow "CI" hoàn tất thành công trên nhánh main.
# Có thể bấm chạy tay qua tab Actions (workflow_dispatch).
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

# Không deploy chồng chéo: hàng đợi 1 lần 1.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    # Chỉ deploy khi CI pass (hoặc khi bấm chạy tay).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: SSH vào VPS và deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          envs: DEPLOY_PATH,REPO_URL,OAUTH2_PROXY_CLIENT_ID,OAUTH2_PROXY_CLIENT_SECRET,OAUTH2_PROXY_COOKIE_SECRET
          script_stop: true
          command_timeout: 20m
          script: |
            set -e

            # Dùng sudo nếu không phải root (cần root hoặc sudo NOPASSWD).
            if [ "$(id -u)" -ne 0 ]; then SUDO="sudo"; else SUDO=""; fi

            echo "==> [1/5] Cài git + curl nếu thiếu"
            if ! command -v git >/dev/null 2>&1 || ! command -v curl >/dev/null 2>&1; then
              $SUDO apt-get update -y
              $SUDO apt-get install -y git curl
            fi

            echo "==> [2/5] Cài Docker nếu thiếu"
            if ! command -v docker >/dev/null 2>&1; then
              curl -fsSL https://get.docker.com | $SUDO sh
            fi

            echo "==> [3/5] Clone repo nếu chưa có ($DEPLOY_PATH)"
            if [ ! -d "$DEPLOY_PATH/.git" ]; then
              $SUDO mkdir -p "$DEPLOY_PATH"
              $SUDO git clone "$REPO_URL" "$DEPLOY_PATH"
              $SUDO chown -R "$(id -un):$(id -gn)" "$DEPLOY_PATH"
            fi

            echo "==> [4/6] Cập nhật code mới nhất"
            cd "$DEPLOY_PATH"
            git config --global --add safe.directory "$DEPLOY_PATH" || true
            git fetch --all --prune
            git reset --hard origin/main

            echo "==> [5/6] Ghi .env (secret OIDC) — giá trị KHÔNG in ra log"
            umask 077
            : > "$DEPLOY_PATH/.env"
            printf 'OAUTH2_PROXY_CLIENT_ID=%s\n'     "$OAUTH2_PROXY_CLIENT_ID"     >> "$DEPLOY_PATH/.env"
            printf 'OAUTH2_PROXY_CLIENT_SECRET=%s\n' "$OAUTH2_PROXY_CLIENT_SECRET" >> "$DEPLOY_PATH/.env"
            printf 'OAUTH2_PROXY_COOKIE_SECRET=%s\n' "$OAUTH2_PROXY_COOKIE_SECRET" >> "$DEPLOY_PATH/.env"

            echo "==> [6/6] Khởi động stack"
            $SUDO docker compose pull
            # --force-recreate để container đọc lại Caddyfile/config.yaml (bind-mount đổi
            # không tự trigger restart). Volume dữ liệu vẫn giữ nguyên (keys, db, certs).
            $SUDO docker compose up -d --force-recreate --remove-orphans
            $SUDO docker compose ps
            echo "==> Log oauth2-proxy (chẩn đoán; oauth2-proxy không in secret)"
            sleep 3
            $SUDO docker logs --tail 25 oauth2-proxy 2>&1 || true
            echo "==> Log headscale (chẩn đoán)"
            $SUDO docker logs --tail 25 headscale 2>&1 || true
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          REPO_URL: https://github.com/vanbienperu3107/deployHeadscale.git
          OAUTH2_PROXY_CLIENT_ID: ${{ secrets.OAUTH2_PROXY_CLIENT_ID }}
          OAUTH2_PROXY_CLIENT_SECRET: ${{ secrets.OAUTH2_PROXY_CLIENT_SECRET }}
          OAUTH2_PROXY_COOKIE_SECRET: ${{ secrets.OAUTH2_PROXY_COOKIE_SECRET }}
