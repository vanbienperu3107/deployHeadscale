name: Deploy

# Chạy tự động SAU KHI workflow "CI" hoàn tất thành công trên nhánh main.
# Có thể bấm chạy tay qua tab Actions (workflow_dispatch).
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch để deploy (mặc định: main)'
        required: false
        default: 'main'
      skip_smoke:
        description: 'Bỏ qua smoke test gate (true/false)'
        required: false
        default: 'false'

# Không deploy chồng chéo: hàng đợi 1 lần 1.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    # Chỉ deploy khi CI pass (hoặc khi bấm chạy tay).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: SSH vào VPS và deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          envs: DEPLOY_PATH,REPO_URL,DEPLOY_BRANCH,SKIP_SMOKE,GHCR_PAT,GHCR_USER,OAUTH2_PROXY_CLIENT_ID,OAUTH2_PROXY_CLIENT_SECRET,OAUTH2_PROXY_COOKIE_SECRET,HEADPLANE_COOKIE_SECRET,HEADPLANE_HS_API_KEY,TS_AUTHKEY,DERP_DATABASE_URL,DERP_SESSION_SECRET,DERP_ALLOWED_EMAILS,HEADSCALE_DASHBOARD_SECRET
          script_stop: true
          command_timeout: 20m
          script: |
            set -e
            trap 'printf "TRAP ERR line=%s rc=%s\n" "$LINENO" "$?"' ERR

            # Dùng sudo nếu không phải root (cần root hoặc sudo NOPASSWD).
            if [ "$(id -u)" -ne 0 ]; then SUDO="sudo"; else SUDO=""; fi

            echo "==> [1/5] Cài git + curl nếu thiếu"
            if ! command -v git >/dev/null 2>&1 || ! command -v curl >/dev/null 2>&1; then
              $SUDO apt-get update -y
              $SUDO apt-get install -y git curl
            fi

            echo "==> [2/5] Cài Docker nếu thiếu"
            if ! command -v docker >/dev/null 2>&1; then
              curl -fsSL https://get.docker.com -o /tmp/install-docker.sh
              DEBIAN_FRONTEND=noninteractive $SUDO sh /tmp/install-docker.sh
              rm -f /tmp/install-docker.sh
            fi
            # Dam bao Docker tu dong khoi dong khi reboot (systemd)
            $SUDO systemctl enable --now docker 2>/dev/null || true

            echo "==> [3/5] Clone repo nếu chưa có ($DEPLOY_PATH)"
            if [ ! -d "$DEPLOY_PATH/.git" ]; then
              $SUDO mkdir -p "$DEPLOY_PATH"
              $SUDO git clone "$REPO_URL" "$DEPLOY_PATH"
              $SUDO chown -R "$(id -un):$(id -gn)" "$DEPLOY_PATH"
            fi

            echo "==> [4/6] Cập nhật code mới nhất (branch: ${DEPLOY_BRANCH:-main})"
            cd "$DEPLOY_PATH"
            git config --global --add safe.directory "$DEPLOY_PATH" || true
            git fetch --all --prune
            git reset --hard "origin/${DEPLOY_BRANCH:-main}"

            echo "==> [5/7] Ghi .env (secret OIDC) — giá trị KHÔNG in ra log"
            umask 077
            : > "$DEPLOY_PATH/.env"
            printf 'OAUTH2_PROXY_CLIENT_ID=%s\n'     "$OAUTH2_PROXY_CLIENT_ID"     >> "$DEPLOY_PATH/.env"
            printf 'OAUTH2_PROXY_CLIENT_SECRET=%s\n' "$OAUTH2_PROXY_CLIENT_SECRET" >> "$DEPLOY_PATH/.env"
            printf 'OAUTH2_PROXY_COOKIE_SECRET=%s\n' "$OAUTH2_PROXY_COOKIE_SECRET" >> "$DEPLOY_PATH/.env"
            printf 'HEADPLANE_COOKIE_SECRET=%s\n'    "$HEADPLANE_COOKIE_SECRET"    >> "$DEPLOY_PATH/.env"
            printf 'HEADPLANE_HS_API_KEY=%s\n'       "$HEADPLANE_HS_API_KEY"       >> "$DEPLOY_PATH/.env"
            # DERP backend (dashboard quan ly DERP): DB Neon, session secret, whitelist email.
            # KHONG in ra log.
            printf 'DERP_DATABASE_URL=%s\n'          "$DERP_DATABASE_URL"          >> "$DEPLOY_PATH/.env"
            printf 'DERP_SESSION_SECRET=%s\n'        "$DERP_SESSION_SECRET"        >> "$DEPLOY_PATH/.env"
            printf 'DERP_ALLOWED_EMAILS=%s\n'        "$DERP_ALLOWED_EMAILS"        >> "$DEPLOY_PATH/.env"
            # TS_AUTHKEY (preauth key cho node 'collector'): uu tien secret GitHub ->
            # file .ts_authkey da luu (tu sinh truoc do) -> de trong (se TU SINH o [7]).
            # KHONG in key ra log.
            if [ -z "$TS_AUTHKEY" ] && [ -f "$DEPLOY_PATH/.ts_authkey" ]; then
              TS_AUTHKEY=$(cat "$DEPLOY_PATH/.ts_authkey")
            fi
            printf 'TS_AUTHKEY=%s\n'                 "$TS_AUTHKEY"                 >> "$DEPLOY_PATH/.env"
            # Feature B: secret dung giua headscale va derp-backend de xac thuc API /api/internal/derp-map/:nodeKey
            printf 'HEADSCALE_DASHBOARD_SECRET=%s\n' "$HEADSCALE_DASHBOARD_SECRET" >> "$DEPLOY_PATH/.env"

            echo "==> [6/7] Khởi động stack"
            # Login vao ghcr.io de pull image private (headscale:0.27.1-pernode).
            if [ -n "$GHCR_PAT" ]; then
              printf '%s' "$GHCR_PAT" | $SUDO docker login ghcr.io -u "${GHCR_USER:-vanbienperu3107}" --password-stdin
            fi
            # Xoa symlink socket cu (tailscaled.sock -> /tmp, tu cac lan truoc) trong
            # volume ts_sock, de tailscaled tao SOCKET THAT trong volume chia se (TS_SOCKET
            # da tro vao day) -> node-dedup goi LocalAPI ping duoc.
            $SUDO docker compose run --rm --no-deps --entrypoint sh tailscale -c 'rm -f /var/run/tailscale/tailscaled.sock' >/dev/null 2>&1 || true
            $SUDO docker compose pull
            # --force-recreate để container đọc lại Caddyfile/config.yaml (bind-mount đổi
            # không tự trigger restart). Volume dữ liệu vẫn giữ nguyên (keys, db, certs).
            $SUDO docker compose up -d --build --force-recreate --remove-orphans

            echo "==> [7/7] Kiem tra collector + tao preauth key neu can"
            echo "  dbg7.1 TS_AUTHKEY set=$([ -n "$TS_AUTHKEY" ] && echo yes || echo no)"
            set +e
            echo "  dbg7.2 set+e done"
            if [ -z "$TS_AUTHKEY" ] && [ -f "$DEPLOY_PATH/.ts_authkey" ]; then
              echo "  dbg7.3 loading .ts_authkey from file"
              TS_AUTHKEY=$(cat "$DEPLOY_PATH/.ts_authkey")
            fi
            echo "  dbg7.4 ts_authkey file check done"
            if [ -z "$TS_AUTHKEY" ]; then
              echo "  Chua co TS_AUTHKEY -> cho headscale san sang roi tao key..."
              hs_ok=0
              for i in $(seq 1 15); do
                printf '  headscale check %d/15...\n' "$i"
                $SUDO docker exec headscale headscale users list -o json >/dev/null 2>&1 && hs_ok=1 && break
                sleep 2
              done
              if [ "$hs_ok" = "1" ]; then
                USERS_JSON=$($SUDO docker exec headscale headscale users list -o json 2>/dev/null)
                [ -z "$USERS_JSON" ] && USERS_JSON='[]'
                U_ID=$(printf '%s' "$USERS_JSON" | grep -oE '"id"[ ]*:[ ]*"?[0-9]+' | head -1 | grep -oE '[0-9]+')
                U_NAME=$(printf '%s' "$USERS_JSON" | grep -oE '"name"[ ]*:[ ]*"[^"]*"' | head -1 | sed -E 's/.*"name"[ ]*:[ ]*"([^"]*)".*/\1/')
                echo "  headscale user: id=${U_ID:-?} name=${U_NAME:-?}"
                for SEL in "$U_ID" "$U_NAME"; do
                  if [ -z "$SEL" ]; then continue; fi
                  OUT=$($SUDO docker exec headscale headscale preauthkeys create --user "$SEL" --reusable --expiration 8760h -o json 2>/dev/null)
                  KEY=$(printf '%s' "$OUT" | grep -oE '"key"[ ]*:[ ]*"[^"]+"' | head -1 | sed -E 's/.*"key"[ ]*:[ ]*"([^"]+)".*/\1/')
                  if [ -n "$KEY" ]; then
                    TS_AUTHKEY="$KEY"
                    printf '%s' "$TS_AUTHKEY" > "$DEPLOY_PATH/.ts_authkey"
                    chmod 600 "$DEPLOY_PATH/.ts_authkey"
                    echo "  Tao preauth key OK voi --user $SEL -> luu .ts_authkey"
                    break
                  fi
                done
              fi
              if [ -z "$TS_AUTHKEY" ]; then
                echo "  CANH BAO: chua tao duoc preauth key -> collector chua join, /stats thieu latency."
              fi
            fi
            echo "  dbg7.5 before col_ip check"
            col_ip=$($SUDO docker exec ts-collector tailscale ip -4 2>/dev/null)
            echo "  dbg7.6 col_ip done"
            if [ -n "$col_ip" ]; then
              echo "  collector da join tailnet: $col_ip"
            else
              echo "  collector chua join tailnet (se tu join sau khi headscale san sang)."
            fi
            $SUDO docker compose ps 2>/dev/null | tail -12
            echo "  dbg7.7 compose ps done, re-enabling set -e"
            set -e   # Bat lai set -e sau phan nay
            echo "  dbg7.8 set -e done"
            echo "==> Log oauth2-proxy (chẩn đoán; oauth2-proxy không in secret)"
            sleep 3
            $SUDO docker logs --tail 25 oauth2-proxy 2>&1 || true
            echo "==> Log headscale (chẩn đoán)"
            $SUDO docker logs --tail 25 headscale 2>&1 || true
            echo "==> Log ts-collector (sidecar; 'collector' join tailnet?)"
            $SUDO docker logs --tail 20 ts-collector 2>&1 || true
            echo "==> Cho 'collector' join + server ping co latency (toi da ~90s)"
            for _ in $(seq 1 30); do
              up=$($SUDO docker logs --tail 40 node-dedup 2>&1 | grep -oE 'server ping: [0-9]+/[0-9]+' | tail -1 || true)
              n=$(printf '%s' "$up" | grep -oE '[0-9]+' | head -1 || echo 0)
              echo "  $up"
              if [ -n "$n" ] && [ "$n" != "0" ]; then echo "  -> /stats da co latency that!"; break; fi
              sleep 3
            done
            echo "==> Log node-dedup (collector RIENG :8090 + goi headscale API)"
            $SUDO docker logs --tail 20 node-dedup 2>&1 || true
            echo "==> Health: Caddy -> node-dedup:8090 /stats (upstream MOI, tach khoi sidecar)"
            code=$($SUDO docker exec caddy sh -c 'wget -S -O /tmp/s.html http://node-dedup:8090/stats 2>&1 | awk "/HTTP\//{print \$2; exit}"; wc -c < /tmp/s.html' 2>&1)
            echo "  status+bytes: $code"
            $SUDO docker exec caddy sh -c 'tail -c 60 /tmp/s.html 2>/dev/null' 2>&1 || true
            echo ""
            echo "==> Health: /stats cong khai chua dang nhap -> mong 302 (Caddy forward_auth)"
            curl -k -sS -o /dev/null -w "  http_code=%{http_code}\n" --resolve vpn2.hangocthanh.io.vn:443:127.0.0.1 "https://vpn2.hangocthanh.io.vn/stats" || echo "curl FAIL"
            echo ""
            echo "==> [SMOKE] Reporter tu xa da bao cao chua? (GATE: fail deploy neu thieu)"
            # Cac reporter BAT BUOC phai bao cao (sua list khi them/bot node DERP).
            # vpn6 da auto-deploy (deploy-relay-vpn6 chay song song sau CI) -> gate
            # cho luon; ~3 phut retry du de vpn6 redeploy + reporter POST lan dau.
            # vpn5 con WIP -> chua dua vao gate.
            EXPECTED_REPORTERS="${EXPECTED_REPORTERS:-vpn3,vpn4,vpn6}"
            HEALTH_WINDOW=200
            if [ "${SKIP_SMOKE:-false}" = "true" ]; then
              echo "  [SMOKE SKIPPED] bo qua theo yeu cau (SKIP_SMOKE=true)."
            else
              smoke_ok=0
              for _ in $(seq 1 18); do   # ~3 phut (18 x 10s) cho reporter join lai + chu ky 30s
                out=$($SUDO docker exec caddy sh -c "wget -q -O - 'http://node-dedup:8090/metrics/health?expect=${EXPECTED_REPORTERS}&window=${HEALTH_WINDOW}'" 2>/dev/null || true)
                echo "  health: $out"
                if printf '%s' "$out" | grep -q '"ok": *true'; then smoke_ok=1; break; fi
                sleep 10
              done
              if [ "$smoke_ok" != "1" ]; then
                echo "  [SMOKE FAIL] reporter chua bao cao trong ${HEALTH_WINDOW}s (expected=$EXPECTED_REPORTERS)."
                echo "  -> Deploy stack VAN chay, nhung tinh nang ping-reporter dang hong. Kiem:"
                echo "     docker logs --tail 40 ping-reporter-vpn3   (tren node DERP tuong ung)"
                exit 1
              fi
              echo "  [SMOKE OK] tat ca reporter bat buoc ($EXPECTED_REPORTERS) dang bao cao."
            fi
            echo ""
            echo "==> Trang thai container"
            $SUDO docker compose ps 2>&1 | tail -12 || true
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          REPO_URL: https://github.com/vanbienperu3107/deployHeadscale.git
          DEPLOY_BRANCH: ${{ github.event.inputs.branch || 'main' }}
          SKIP_SMOKE: ${{ github.event.inputs.skip_smoke || 'false' }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          GHCR_USER: vanbienperu3107
          OAUTH2_PROXY_CLIENT_ID: ${{ secrets.OAUTH2_PROXY_CLIENT_ID }}
          OAUTH2_PROXY_CLIENT_SECRET: ${{ secrets.OAUTH2_PROXY_CLIENT_SECRET }}
          OAUTH2_PROXY_COOKIE_SECRET: ${{ secrets.OAUTH2_PROXY_COOKIE_SECRET }}
          HEADPLANE_COOKIE_SECRET: ${{ secrets.HEADPLANE_COOKIE_SECRET }}
          HEADPLANE_HS_API_KEY: ${{ secrets.HEADPLANE_HS_API_KEY }}
          TS_AUTHKEY: ${{ secrets.TS_AUTHKEY }}
          DERP_DATABASE_URL: ${{ secrets.DERP_DATABASE_URL }}
          DERP_SESSION_SECRET: ${{ secrets.DERP_SESSION_SECRET }}
          DERP_ALLOWED_EMAILS: ${{ secrets.DERP_ALLOWED_EMAILS }}
          HEADSCALE_DASHBOARD_SECRET: ${{ secrets.HEADSCALE_DASHBOARD_SECRET }}
