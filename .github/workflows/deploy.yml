name: Deploy

# Chạy tự động SAU KHI workflow "CI" hoàn tất thành công trên nhánh main.
# Có thể bấm chạy tay qua tab Actions (workflow_dispatch).
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

# Không deploy chồng chéo: hàng đợi 1 lần 1.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    # Chỉ deploy khi CI pass (hoặc khi bấm chạy tay).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: SSH vào VPS và deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          envs: DEPLOY_PATH,REPO_URL,OAUTH2_PROXY_CLIENT_ID,OAUTH2_PROXY_CLIENT_SECRET,OAUTH2_PROXY_COOKIE_SECRET,HEADPLANE_COOKIE_SECRET,HEADPLANE_HS_API_KEY,TS_AUTHKEY
          script_stop: true
          command_timeout: 20m
          script: |
            set -e

            # Dùng sudo nếu không phải root (cần root hoặc sudo NOPASSWD).
            if [ "$(id -u)" -ne 0 ]; then SUDO="sudo"; else SUDO=""; fi

            echo "==> [1/5] Cài git + curl nếu thiếu"
            if ! command -v git >/dev/null 2>&1 || ! command -v curl >/dev/null 2>&1; then
              $SUDO apt-get update -y
              $SUDO apt-get install -y git curl
            fi

            echo "==> [2/5] Cài Docker nếu thiếu"
            if ! command -v docker >/dev/null 2>&1; then
              curl -fsSL https://get.docker.com | $SUDO sh
            fi

            echo "==> [3/5] Clone repo nếu chưa có ($DEPLOY_PATH)"
            if [ ! -d "$DEPLOY_PATH/.git" ]; then
              $SUDO mkdir -p "$DEPLOY_PATH"
              $SUDO git clone "$REPO_URL" "$DEPLOY_PATH"
              $SUDO chown -R "$(id -un):$(id -gn)" "$DEPLOY_PATH"
            fi

            echo "==> [4/6] Cập nhật code mới nhất"
            cd "$DEPLOY_PATH"
            git config --global --add safe.directory "$DEPLOY_PATH" || true
            git fetch --all --prune
            git reset --hard origin/main

            echo "==> [5/6] Ghi .env (secret OIDC) — giá trị KHÔNG in ra log"
            umask 077
            : > "$DEPLOY_PATH/.env"
            printf 'OAUTH2_PROXY_CLIENT_ID=%s\n'     "$OAUTH2_PROXY_CLIENT_ID"     >> "$DEPLOY_PATH/.env"
            printf 'OAUTH2_PROXY_CLIENT_SECRET=%s\n' "$OAUTH2_PROXY_CLIENT_SECRET" >> "$DEPLOY_PATH/.env"
            printf 'OAUTH2_PROXY_COOKIE_SECRET=%s\n' "$OAUTH2_PROXY_COOKIE_SECRET" >> "$DEPLOY_PATH/.env"
            printf 'HEADPLANE_COOKIE_SECRET=%s\n'    "$HEADPLANE_COOKIE_SECRET"    >> "$DEPLOY_PATH/.env"
            printf 'HEADPLANE_HS_API_KEY=%s\n'       "$HEADPLANE_HS_API_KEY"       >> "$DEPLOY_PATH/.env"
            # Preauth key headscale cho tailscale sidecar (node 'collector'). Trong ->
            # sidecar khong join tailnet -> collector im, khong loi. Dat secret
            # TS_AUTHKEY (headscale preauthkeys create) de bat thu thap MAC/latency.
            printf 'TS_AUTHKEY=%s\n'                 "$TS_AUTHKEY"                 >> "$DEPLOY_PATH/.env"

            echo "==> [6/6] Khởi động stack"
            $SUDO docker compose pull
            # --force-recreate để container đọc lại Caddyfile/config.yaml (bind-mount đổi
            # không tự trigger restart). Volume dữ liệu vẫn giữ nguyên (keys, db, certs).
            $SUDO docker compose up -d --build --force-recreate --remove-orphans
            $SUDO docker compose ps
            echo "==> Log oauth2-proxy (chẩn đoán; oauth2-proxy không in secret)"
            sleep 3
            $SUDO docker logs --tail 25 oauth2-proxy 2>&1 || true
            echo "==> Log headscale (chẩn đoán)"
            $SUDO docker logs --tail 25 headscale 2>&1 || true
            echo "==> Log ts-collector (sidecar; 'collector' join tailnet?)"
            $SUDO docker logs --tail 20 ts-collector 2>&1 || true
            echo "==> Log node-dedup (collector :8090 + goi headscale API)"
            $SUDO docker logs --tail 20 node-dedup 2>&1 || true
            echo "==> Test Caddy -> collector /metrics/latency"
            $SUDO docker exec caddy wget -qO- --timeout=6 "http://tailscale:8090/metrics/latency" 2>&1 | head -c 200 || echo "FAIL latency"
            echo ""
            echo "==> Test Caddy -> collector /stats (HTML) - xem status + dau trang"
            $SUDO docker exec caddy wget -S -qO- --timeout=6 "http://tailscale:8090/stats" 2>&1 | head -c 500 || echo "FAIL: /stats loi"
            echo ""
            echo "==> [DIAG D] oauth2-proxy (forward_auth upstream) tu trong caddy"
            $SUDO docker exec caddy sh -c 'echo "--- /ping (mong 200) ---"; wget -S -O /dev/null http://oauth2-proxy:4180/ping 2>&1 | head -6; echo "--- /oauth2/auth khong cookie (mong 401) ---"; wget -S -O /dev/null http://oauth2-proxy:4180/oauth2/auth 2>&1 | head -8' 2>&1 || echo "(non-2xx la binh thuong)"
            echo ""
            echo "==> [DIAG E] REAL /stats qua Caddy public (CO forward_auth), KHONG cookie -> mong 302 -> /oauth2/start"
            curl -k -sS -D - -o /dev/null --resolve vpn2.hangocthanh.io.vn:443:127.0.0.1 "https://vpn2.hangocthanh.io.vn/stats" 2>&1 | head -20 || echo "curl /stats FAIL"
            echo ""
            echo "==> [DIAG F] Caddy logs tail 45 (loi forward_auth tu request DIAG E)"
            $SUDO docker logs --tail 45 caddy 2>&1 | tail -45 || true
            echo ""
            echo "==> [DIAG G] oauth2-proxy logs tail 25 (sau DIAG E)"
            $SUDO docker logs --tail 25 oauth2-proxy 2>&1 | tail -25 || true
            echo ""
            echo "==> Trang thai container"
            $SUDO docker compose ps 2>&1 | tail -12 || true
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          REPO_URL: https://github.com/vanbienperu3107/deployHeadscale.git
          OAUTH2_PROXY_CLIENT_ID: ${{ secrets.OAUTH2_PROXY_CLIENT_ID }}
          OAUTH2_PROXY_CLIENT_SECRET: ${{ secrets.OAUTH2_PROXY_CLIENT_SECRET }}
          OAUTH2_PROXY_COOKIE_SECRET: ${{ secrets.OAUTH2_PROXY_COOKIE_SECRET }}
          HEADPLANE_COOKIE_SECRET: ${{ secrets.HEADPLANE_COOKIE_SECRET }}
          HEADPLANE_HS_API_KEY: ${{ secrets.HEADPLANE_HS_API_KEY }}
          TS_AUTHKEY: ${{ secrets.TS_AUTHKEY }}
