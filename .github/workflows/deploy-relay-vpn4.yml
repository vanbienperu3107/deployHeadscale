name: Deploy Relay (vpn4)

# CHI CHAY KHI DUOC GOI TAY — khong tu dong sau CI.
# Luu y: deploy nay se THAY THE derp-vpn4 (standard derper) bang hybrid relay.
# Kiem tra ky truoc khi bam Run workflow.
on:
  workflow_dispatch:

concurrency:
  group: deploy-relay-vpn4
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy hybrid relay to vpn4 (replaces derp-vpn4)
    runs-on: ubuntu-latest
    steps:
      - name: SSH vao vpn4 va deploy relay + tailscale + ping-reporter
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST_VPN4 }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -e
            if [ "$(id -u)" -ne 0 ]; then SUDO="sudo"; else SUDO=""; fi

            echo "==> [0/7] Cho dpkg lock giai phong"
            $SUDO systemctl stop unattended-upgrades 2>/dev/null || true
            $SUDO systemctl stop apt-daily.service apt-daily-upgrade.service 2>/dev/null || true
            i=0
            while flock -n /var/lib/dpkg/lock-frontend -c true 2>/dev/null; [ $? -ne 0 ] && [ $i -lt 30 ]; do
              echo "  dpkg busy, cho 5s... ($i)"; sleep 5; i=$((i+1))
            done

            echo "==> [1/7] Cai git + docker neu thieu"
            if ! command -v git >/dev/null 2>&1; then
              DEBIAN_FRONTEND=noninteractive $SUDO apt-get update -y
              DEBIAN_FRONTEND=noninteractive $SUDO apt-get install -y git
            fi
            if ! command -v docker >/dev/null 2>&1; then
              curl -fsSL https://get.docker.com -o /tmp/install-docker.sh
              DEBIAN_FRONTEND=noninteractive $SUDO sh /tmp/install-docker.sh
              rm -f /tmp/install-docker.sh
            fi
            $SUDO systemctl enable --now docker 2>/dev/null || true

            echo "==> [2/7] Clone/cap nhat repo"
            DEPLOY_PATH="${DEPLOY_PATH:-$HOME/deployHeadscale}"
            REPO_URL="https://github.com/vanbienperu3107/deployHeadscale.git"
            if [ ! -d "$DEPLOY_PATH/.git" ]; then
              $SUDO mkdir -p "$DEPLOY_PATH"
              $SUDO git clone "$REPO_URL" "$DEPLOY_PATH"
              $SUDO chown -R "$(id -un):$(id -gn)" "$DEPLOY_PATH"
            fi
            cd "$DEPLOY_PATH"
            git config --global --add safe.directory "$DEPLOY_PATH" || true
            git fetch --all --prune
            git reset --hard origin/main

            echo "==> [3/7] Dung derp-vpn4 (standard derper) truoc khi chuyen sang hybrid relay"
            if [ -d "$DEPLOY_PATH/derp-vpn4" ]; then
              cd "$DEPLOY_PATH/derp-vpn4"
              $SUDO docker compose down 2>/dev/null || true
              echo "  derp-vpn4 stopped OK"
            fi
            cd "$DEPLOY_PATH"

            echo "==> [4/7] Lay hoac tao TS_AUTHKEY cho tailscale vpn4"
            TS_AUTHKEY=""
            if [ -f "$DEPLOY_PATH/.ts_authkey_vpn4" ]; then
              TS_AUTHKEY=$(cat "$DEPLOY_PATH/.ts_authkey_vpn4")
              echo "  Dung .ts_authkey_vpn4 da luu"
            fi
            if [ -z "$TS_AUTHKEY" ] && [ -n "$HS_API_KEY" ]; then
              echo "  Chua co key -> tu tao via headscale API"
              EXPIRY=$(date -d '+365 days' -u +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || \
                       date -u -v +365d +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || echo "")
              USERS=$(curl -sf -H "Authorization: Bearer $HS_API_KEY" \
                "https://vpn2.hangocthanh.io.vn/api/v1/user" 2>/dev/null || echo '{}')
              U_NAME=$(printf '%s' "$USERS" | grep -oE '"name":"[^"]+"' | head -1 | \
                sed -E 's/"name":"//;s/"$//')
              if [ -n "$U_NAME" ] && [ -n "$EXPIRY" ]; then
                RESP=$(curl -sf -X POST \
                  -H "Authorization: Bearer $HS_API_KEY" \
                  -H "Content-Type: application/json" \
                  -d "{\"user\":\"$U_NAME\",\"reusable\":true,\"expiration\":\"$EXPIRY\"}" \
                  "https://vpn2.hangocthanh.io.vn/api/v1/preauthkey" 2>/dev/null || echo '{}')
                TS_AUTHKEY=$(printf '%s' "$RESP" | grep -oE '"key":"[^"]+"' | head -1 | \
                  sed -E 's/"key":"//;s/"$//')
                if [ -n "$TS_AUTHKEY" ]; then
                  printf '%s' "$TS_AUTHKEY" > "$DEPLOY_PATH/.ts_authkey_vpn4"
                  chmod 600 "$DEPLOY_PATH/.ts_authkey_vpn4"
                  echo "  Tao key OK (user=$U_NAME)"
                fi
              fi
            fi
            umask 077
            printf 'TS_AUTHKEY=%s\n' "${TS_AUTHKEY:-}" > "$DEPLOY_PATH/relay-vpn4/.env"
            echo "  .env da ghi"

            echo "==> [5/7] Cap nhat Traefik config"
            {
              PANGOLIN_BASE=""
              for _dir in "$HOME/opt/pangolin" "/opt/pangolin" "/home/ubuntu/opt/pangolin"; do
                if [ -d "$_dir/config/traefik" ]; then PANGOLIN_BASE="$_dir"; break; fi
              done
              if [ -n "$PANGOLIN_BASE" ]; then
                _DYN="$PANGOLIN_BASE/config/traefik/dynamic"
                mkdir -p "$_DYN" || true
                $SUDO cp "$DEPLOY_PATH/relay-vpn4/traefik-relay-vpn4.yml" \
                  "$_DYN/traefik-relay-vpn4.yml" || true
                echo "  Copied -> $_DYN/"
                _CFG="$PANGOLIN_BASE/config/traefik/traefik_config.yml"
                if [ -f "$_CFG" ] && grep -q "filename:" "$_CFG" 2>/dev/null; then
                  cp "$PANGOLIN_BASE/config/traefik/dynamic_config.yml" \
                     "$_DYN/dynamic_config.yml" 2>/dev/null || true
                  sed -i "s|filename: /etc/traefik/dynamic_config.yml|directory: /etc/traefik/dynamic|g" \
                    "$_CFG" || true
                  docker restart pan-traefik 2>/dev/null || true
                  echo "  Traefik migrated filename->directory"
                else
                  echo "  Traefik OK (directory mode hoac config khong tim thay)"
                fi
              else
                echo "  WARN: Pangolin dir khong tim thay — bo qua"
              fi
            } || true

            echo "==> [6/7] Khoi dong relay + tailscale + ping-reporter"
            cd "$DEPLOY_PATH/relay-vpn4"
            $SUDO docker compose run --rm --no-deps --entrypoint sh tailscale \
              -c 'rm -f /var/run/tailscale/tailscaled.sock' >/dev/null 2>&1 || true
            $SUDO docker compose pull tailscale 2>/dev/null || true
            $SUDO docker compose up -d --build --force-recreate --remove-orphans

            echo "==> [7/7] Kiem tra health"
            sleep 15
            $SUDO docker compose ps

            echo "  Kiem tra relay /relay/probe (toi da 90s)..."
            for _ in $(seq 1 15); do
              CODE=$(curl -sk -o /dev/null -w "%{http_code}" \
                "https://vpn4.hangocthanh.io.vn/relay/probe" 2>/dev/null || echo 000)
              echo "  /relay/probe: HTTP $CODE"
              [ "$CODE" = "200" ] && break
              sleep 6
            done

            echo "  Kiem tra tailscale vpn4 join tailnet..."
            for _ in $(seq 1 15); do
              IP=$($SUDO docker exec ts-vpn4 tailscale ip -4 2>/dev/null || true)
              if [ -n "$IP" ]; then
                echo "  vpn4 DA join tailnet: $IP"; break
              fi
              echo "  Chua join, cho 4s..."; sleep 4
            done

            echo "  Log relay-vpn4 (30 dong cuoi):"
            $SUDO docker logs --tail 30 relay-vpn4 2>&1 || true
            echo "  Log ts-vpn4 (15 dong cuoi):"
            $SUDO docker logs --tail 15 ts-vpn4 2>&1 || true
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          HS_API_KEY: ${{ secrets.HEADPLANE_HS_API_KEY }}
