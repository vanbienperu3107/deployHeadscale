services:
  headscale:
    image: headscale/headscale:0.28.0
    container_name: headscale
    restart: unless-stopped
    command: serve
    volumes:
      - ./config:/etc/headscale
      - headscale_data:/var/lib/headscale
      - headscale_run:/var/run/headscale
    ports:
      - "3478:3478/udp"   # STUN / DERP
      # Các port dưới chỉ expose nội bộ (behind Caddy). Bỏ comment nếu cần debug.
      # - "127.0.0.1:8080:8080"   # HTTP API
      # - "127.0.0.1:9090:9090"   # Metrics
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1

  # Web UI quản lý Headscale (truy cập tại https://<domain>/admin)
  # Tag bám version headscale-admin; bump lên 0.28 khi có bản khớp headscale 0.28.
  headscale-admin:
    image: goodieshq/headscale-admin:v0.27
    container_name: headscale-admin
    restart: unless-stopped
    depends_on:
      - headscale

  # SSO gác cổng /admin bằng Google OIDC.
  # Secret (client id/secret/cookie) đọc từ .env (workflow tự ghi từ GitHub Secrets).
  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
    container_name: oauth2-proxy
    restart: unless-stopped
    command:
      - --provider=google
      - --http-address=0.0.0.0:4180
      - --reverse-proxy=true
      - --set-xauthrequest=true
      - --upstream=static://200
      - --email-domain=*
      - --authenticated-emails-file=/etc/oauth2-proxy/emails.txt
      - --redirect-url=https://vpn2.hangocthanh.io.vn/oauth2/callback
      - --whitelist-domain=vpn2.hangocthanh.io.vn
      - --cookie-domain=vpn2.hangocthanh.io.vn
      - --cookie-secure=true
    env_file:
      - .env        # OAUTH2_PROXY_CLIENT_ID / _CLIENT_SECRET / _COOKIE_SECRET
    volumes:
      - ./oauth2-proxy/emails.txt:/etc/oauth2-proxy/emails.txt:ro
    depends_on:
      - headscale-admin

  caddy:
    image: caddy:2
    container_name: caddy
    restart: unless-stopped
    depends_on:
      - headscale
      - headscale-admin
      - oauth2-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  headscale_data:
  headscale_run:
  caddy_data:
  caddy_config:
