services:
  headscale:
    # Custom build với Feature B (per-node DERPMap). Base = 0.27.1; patch thêm
    # derp/patch.go + mapper/builder.go để headscale gọi dashboard API lấy DERPMap
    # riêng cho từng node. Xem: github.com/vanbienperu3107/headscale feat/pernode-derpmap
    image: ghcr.io/vanbienperu3107/headscale:0.27.1-pernode
    container_name: headscale
    restart: unless-stopped
    command: serve
    depends_on:
      derp-backend:
        condition: service_healthy
    # OIDC client (Google) cho đăng ký thiết bị tự động — tái dùng đúng Google
    # OAuth client của oauth2-proxy. Giá trị lấy từ .env (gitignored), nên secret
    # KHÔNG nằm trong repo. config/config.yaml chỉ chứa issuer/scope/allowed_users.
    environment:
      - HEADSCALE_OIDC_CLIENT_ID=${OAUTH2_PROXY_CLIENT_ID:-}
      - HEADSCALE_OIDC_CLIENT_SECRET=${OAUTH2_PROXY_CLIENT_SECRET:-}
      # Feature B: secret cho headscale gọi dashboard API /api/internal/derp-map/:nodeKey
      # Phải khớp với HEADSCALE_DASHBOARD_SECRET trong derp-backend (.env)
      - HEADSCALE_DERP_DASHBOARD_SECRET=${HEADSCALE_DASHBOARD_SECRET:-}
    volumes:
      - ./config:/etc/headscale
      - headscale_data_027:/var/lib/headscale
      - headscale_run_027:/var/run/headscale
    ports:
      - "3478:3478/udp"   # STUN / DERP
      # Các port dưới chỉ expose nội bộ (behind Caddy). Bỏ comment nếu cần debug.
      # - "127.0.0.1:8080:8080"   # HTTP API
      # - "127.0.0.1:9090:9090"   # Metrics
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1

  # Web UI quản lý Headscale (truy cập tại https://<domain>/admin)
  # Khớp version với headscale 0.27 (admin 0.27 hiểu định dạng API key của headscale 0.27).
  headscale-admin:
    image: goodieshq/headscale-admin:v0.27
    container_name: headscale-admin
    restart: unless-stopped
    depends_on:
      - headscale

  # SSO gác cổng /admin bằng Google OIDC.
  # Secret (client id/secret/cookie) đọc từ .env (workflow tự ghi từ GitHub Secrets).
  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
    container_name: oauth2-proxy
    restart: unless-stopped
    command:
      - --provider=google
      - --http-address=0.0.0.0:4180
      - --reverse-proxy=true
      - --set-xauthrequest=true
      - --upstream=static://200
      - --email-domain=*
      - --authenticated-emails-file=/etc/oauth2-proxy/emails.txt
      - --redirect-url=https://vpn2.hangocthanh.io.vn/oauth2/callback
      - --whitelist-domain=vpn2.hangocthanh.io.vn
      - --cookie-domain=vpn2.hangocthanh.io.vn
      - --cookie-secure=true
    env_file:
      # .env do workflow Deploy ghi từ GitHub Secrets trên VPS (gitignored).
      # required:false để `docker compose config` ở CI không fail khi chưa có .env.
      - path: .env        # OAUTH2_PROXY_CLIENT_ID / _CLIENT_SECRET / _COOKIE_SECRET
        required: false
    volumes:
      - ./oauth2-proxy/emails.txt:/etc/oauth2-proxy/emails.txt:ro
    depends_on:
      - headscale-admin

  # Headplane — UI quản lý headscale chạy server-side: đăng nhập Google (OIDC)
  # rồi tự dùng API key cấu hình sẵn → user KHÔNG phải nhập key. Phục vụ tại /admin.
  # Secret nạp từ .env qua HEADPLANE_*; client_id/secret tái dùng Google client
  # của oauth2-proxy (OAUTH2_PROXY_CLIENT_ID/_SECRET).
  headplane:
    image: ghcr.io/tale/headplane:0.6.3
    container_name: headplane
    restart: unless-stopped
    # Env tự động được nạp (v0.6.3 bỏ HEADPLANE_LOAD_ENV_OVERRIDES).
    # v0.6.3: API key headplane dùng sau khi login OIDC nằm ở oidc.headscale_api_key.
    environment:
      - HEADPLANE_OIDC__HEADSCALE_API_KEY=${HEADPLANE_HS_API_KEY:-}
      - HEADPLANE_SERVER__COOKIE_SECRET=${HEADPLANE_COOKIE_SECRET:-}
      - HEADPLANE_OIDC__CLIENT_ID=${OAUTH2_PROXY_CLIENT_ID:-}
      - HEADPLANE_OIDC__CLIENT_SECRET=${OAUTH2_PROXY_CLIENT_SECRET:-}
    volumes:
      - ./headplane/config.yaml:/etc/headplane/config.yaml:ro
      - headplane_data:/var/lib/headplane
    depends_on:
      - headscale

  # node-dedup — "1 thiet bi (theo hostname) = 1 node". Gom node trung: xoa ban
  # trung dang OFFLINE + doi ten node giu lai ve hostname sach (bo hau to ngau
  # nhien headscale them khi machine key doi). Luu lich su thiet bi vao SQLite.
  # Dung HEADPLANE_HS_API_KEY (da co san trong .env) de goi headscale API.
  # Chay THAT (live) mac dinh -> tu dong gop node trung. Muon chi-LOG-ke-hoach
  # (an toan, khong xoa/doi ten) thi dat DEDUP_DRY_RUN=true.
  # tailscale (sidecar) — VPS tham gia CHINH tailnet cua no nhu 1 node ten
  # 'collector'. node-dedup chay trong netns nay -> collector lang nghe TREN
  # tailnet. Nho vay cac node bao cao KHONG can token (Tailscale tu xac thuc).
  # TS_AUTHKEY = preauth key headscale (secret tren server). Trong -> khong join
  # (collector im, cac node khong thay peer 'collector', khong loi).
  tailscale:
    image: tailscale/tailscale:latest
    container_name: ts-collector
    hostname: collector
    restart: unless-stopped
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY:-}
      - TS_EXTRA_ARGS=--login-server=https://vpn2.hangocthanh.io.vn --hostname=collector --accept-dns=false
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
      # Mac dinh image dat socket o /tmp/tailscaled.sock (RIENG container) va chi
      # symlink vao /var/run/tailscale -> node-dedup (container khac) khong toi duoc
      # socket THAT => LocalAPI ping luon fail. Ep socket THAT nam trong volume
      # chia se ts_sock -> node-dedup goi LocalAPI ping duoc.
      - TS_SOCKET=/var/run/tailscale/tailscaled.sock
    volumes:
      - tailscale_collector:/var/lib/tailscale
      # Chia se socket LocalAPI -> node-dedup goi duoc `ping` tu phia server.
      - ts_sock:/var/run/tailscale
    devices:
      - /dev/net/tun
    cap_add:
      - NET_ADMIN
    depends_on:
      - headscale
      - caddy

  # node-dedup — "1 thiet bi (theo hostname) = 1 node" + collector MAC/latency.
  # QUAN TRONG: chay nhu container RIENG tren compose network (KHONG con dung
  # network_mode: service:tailscale). Ly do: tailscale sidecar restart-loop khi
  # thieu TS_AUTHKEY; neu node-dedup nam trong netns do thi moi lan sidecar restart
  # se lam mat cong 8090 -> Caddy reverse_proxy bao "connection refused" -> /stats
  # 502. Tach ra -> /stats LUON song (phuc vu tu SQLite), khong phu thuoc sidecar.
  # SERVER tu ping node: van goi LocalAPI cua sidecar QUA SOCKET CHIA SE (volume
  # ts_sock) -> khong can chung netns. Sidecar offline thi ping fail nhe nhang.
  node-dedup:
    image: python:3.12-slim
    container_name: node-dedup
    restart: unless-stopped
    command: ["python3", "/app/dedup.py"]
    environment:
      - HS_API_URL=http://headscale:8080
      - HS_API_KEY=${HEADPLANE_HS_API_KEY:-}
      - POLL_INTERVAL=30
      - DB_PATH=/data/devices.db
      - DRY_RUN=${DEDUP_DRY_RUN:-false}
      # TU DUYET moi route node quang ba (server-side, khong tag/khong sua client).
      - AUTO_APPROVE_ROUTES=${AUTO_APPROVE_ROUTES:-true}
      - METRICS_PORT=8090
      # Socket LocalAPI cua sidecar (volume chia se) -> SERVER tu ping moi node.
      - TS_SOCKET=/var/run/tailscale/tailscaled.sock
    volumes:
      - ./node-dedup/dedup.py:/app/dedup.py:ro
      - dedup_data:/data
      - ts_sock:/var/run/tailscale
    depends_on:
      - headscale

  # ts-forward — cau noi cho node TU BAO CAO MAC (qua tailnet). node-dedup da tach
  # khoi netns sidecar nen KHONG con dia chi tailnet; forwarder nay chay TRONG netns
  # sidecar (co IP tailnet 'collector') va day cong 8090 -> node-dedup:8090. Nho vay
  # node gui POST /metrics/report toi peer 'collector' van toi duoc node-dedup.
  # Neu sidecar/forwarder chet thi chi MAC-report tam ngung, /stats van song.
  ts-forward:
    image: alpine/socat:latest
    container_name: ts-forward
    restart: unless-stopped
    network_mode: "service:tailscale"
    command: ["TCP-LISTEN:8090,fork,reuseaddr", "TCP:node-dedup:8090"]
    depends_on:
      - tailscale
      - node-dedup

  # Dashboard quan ly DERP (shadcnAdminCustom repo). Image duoc build va push tu
  # shadcnAdminCustom CI (tag deploy-dashboard-*) -> ghcr.io/vanbienperu3107/derp-backend:latest.
  # compose pull tu GHCR -> container luon song cung compose stack, khong bi mat sau deploy.
  # /app/* -> Caddy -> derp-backend:8787. headscale -> /derpmap.json -> chi node enabled.
  derp-backend:
    image: ghcr.io/vanbienperu3107/derp-backend:latest
    container_name: derp-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DERP_DATABASE_URL:-}
      - PORT=8787
      - PUBLIC_URL=https://vpn2.hangocthanh.io.vn/app
      # Tai dung Google OAuth client cua oauth2-proxy (cung domain, them callback /app/auth/callback).
      - GOOGLE_CLIENT_ID=${OAUTH2_PROXY_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${OAUTH2_PROXY_CLIENT_SECRET:-}
      - SESSION_SECRET=${DERP_SESSION_SECRET:-}
      - ALLOWED_EMAILS=${DERP_ALLOWED_EMAILS:-}
      # API key headscale de dashboard goi API (tao key, list node...).
      - HEADSCALE_API_KEY=${HEADPLANE_HS_API_KEY:-}
      # Secret xac thuc call noi bo headscale -> /api/internal/derp-map/:nodeKey (Feature B).
      - HEADSCALE_DASHBOARD_SECRET=${HEADSCALE_DASHBOARD_SECRET:-}
      - AUTH_OPTIONAL=false
      - NODE_ENV=production
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8787/healthz 2>/dev/null | grep -q ok || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 20s

  caddy:
    # Build Caddy kem plugin replace-response (chen nut "Thong ke" vao /admin).
    build: ./caddy
    container_name: caddy
    restart: unless-stopped
    depends_on:
      - headscale
      - headscale-admin
      - oauth2-proxy
      - headplane
      - node-dedup
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  headscale_data_027:
  headscale_run_027:
  headplane_data:
  dedup_data:
  tailscale_collector:
  ts_sock:
  caddy_data:
  caddy_config:
